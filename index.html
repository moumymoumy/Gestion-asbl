<style>
  :root{
    --bg:#F6F7F5;
    --surface:#FFFFFF;
    --surface-2:#EFF2EF;
    --ink:#182024;
    --ink-soft:#5B6A6D;
    --primary:#0F5257;
    --primary-dark:#0B3A3E;
    --primary-soft:#E4EEEE;
    --accent:#E3A008;
    --accent-soft:#FCF0D3;
    --success:#2F9E44;
    --success-soft:#E6F6EA;
    --danger:#E03131;
    --danger-soft:#FCE9E9;
    --border:#E2E6E4;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    overscroll-behavior:none;
  }
  h1,h2,h3,h4,.font-display{font-family:'Sora',system-ui,sans-serif;}
  .font-mono-num{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:#D3D9D6;border-radius:8px;}
  ::-webkit-scrollbar-track{background:transparent;}

  .app-shell{display:flex; height:100vh; overflow:hidden;}

  /* Sidebar (desktop) */
  .sidebar{
    width:260px; flex-shrink:0; background:var(--surface);
    border-right:1px solid var(--border);
    display:flex; flex-direction:column;
    padding:20px 14px;
  }
  .brand{display:flex; align-items:center; gap:10px; padding:6px 8px 22px 8px;}
  .brand-mark{
    width:36px;height:36px;border-radius:10px;
    background:linear-gradient(135deg, var(--primary), var(--primary-dark));
    display:flex;align-items:center;justify-content:center; color:white; flex-shrink:0;
  }
  .nav-item{
    display:flex; align-items:center; gap:12px;
    padding:11px 14px; border-radius:12px; color:var(--ink-soft);
    font-weight:600; font-size:14.5px; cursor:pointer; user-select:none;
    transition:background .15s ease, color .15s ease, transform .1s ease;
    margin-bottom:4px;
  }
  .nav-item:hover{background:var(--surface-2); color:var(--ink);}
  .nav-item.active{background:var(--primary-soft); color:var(--primary-dark);}
  .nav-item:active{transform:scale(0.98);}
  .nav-item svg{width:19px;height:19px; flex-shrink:0;}

  .file-status-box{
    margin-top:auto; padding:12px; border-radius:14px; background:var(--surface-2);
    font-size:12.5px; color:var(--ink-soft); line-height:1.5;
  }
  .file-status-dot{width:8px;height:8px;border-radius:50%; display:inline-block; margin-right:6px;}

  /* Main content */
  .main-area{flex:1; overflow-y:auto; padding:28px 34px 100px 34px;}

  /* --- Mode consultation seule : tout reste visible mais non modifiable --- */
  .lecture-seule-banner{
    display:none; align-items:center; gap:10px; background:var(--accent-soft); color:#8a6100;
    font-size:13px; font-weight:600; padding:10px 16px; border-radius:12px; margin-bottom:18px;
  }
  body.mode-lecture-seule .main-area .view-section:not(#view-sync) button,
  body.mode-lecture-seule .main-area .view-section:not(#view-sync) input,
  body.mode-lecture-seule .main-area .view-section:not(#view-sync) select,
  body.mode-lecture-seule .main-area .view-section:not(#view-sync) textarea{
    pointer-events:none !important;
    opacity:.45;
    filter:grayscale(35%);
  }
  .view-section{display:none; animation:fadeUp .28s ease;}
  .view-section.active{display:block;}
  @keyframes fadeUp{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

  .card{background:var(--surface); border:1px solid var(--border); border-radius:16px; box-shadow:0 1px 2px rgba(20,30,30,0.03);}
  .btn-primary{
    background:var(--primary); color:white; font-weight:600; font-size:14px;
    padding:10px 18px; border-radius:11px; display:inline-flex; align-items:center; gap:8px;
    transition:background .15s ease, transform .1s ease; border:none; cursor:pointer;
  }
  .btn-primary:hover{background:var(--primary-dark);}
  .btn-primary:active{transform:scale(0.97);}
  .btn-secondary{
    background:var(--surface); color:var(--ink); font-weight:600; font-size:14px;
    padding:10px 18px; border-radius:11px; display:inline-flex; align-items:center; gap:8px;
    transition:background .15s ease, transform .1s ease; border:1px solid var(--border); cursor:pointer;
  }
  .btn-secondary:hover{background:var(--surface-2);}
  .btn-secondary:active{transform:scale(0.97);}
  .btn-primary:disabled, .btn-secondary:disabled{
    opacity:.4; cursor:not-allowed; pointer-events:auto;
  }
  .btn-primary:disabled:hover{background:var(--primary); transform:none;}
  .btn-secondary:disabled:hover{background:var(--surface); transform:none;}
  .btn-danger-ghost{
    color:var(--danger); background:transparent; border:none; cursor:pointer;
    padding:6px; border-radius:8px; transition:background .15s ease;
  }
  .btn-danger-ghost:hover{background:var(--danger-soft);}

  .btn-edit-ghost{
    color:var(--ink-soft); background:transparent; border:none; cursor:pointer;
    padding:6px; border-radius:8px; transition:background .15s ease, color .15s ease;
  }
  .btn-edit-ghost:hover{background:var(--primary-soft); color:var(--primary-dark);}

  .input-field{
    width:100%; padding:10px 12px; border-radius:10px; border:1px solid var(--border);
    background:var(--surface); font-size:14px; color:var(--ink); font-family:'Inter',sans-serif;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  .input-field:focus{outline:none; border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-soft);}
  .field-label{font-size:12.5px; font-weight:600; color:var(--ink-soft); margin-bottom:6px; display:block;}

  .badge{font-size:11.5px; font-weight:700; padding:3px 9px; border-radius:999px; letter-spacing:.02em;}
  .kpi-value{font-size:28px; font-weight:700; letter-spacing:-0.01em;}

  .progress-track{width:100%; height:9px; background:var(--surface-2); border-radius:999px; overflow:hidden;}
  .progress-fill{height:100%; border-radius:999px; transition:width .5s cubic-bezier(.4,0,.2,1); background:linear-gradient(90deg, var(--primary), var(--primary-dark));}

  input[type=range].slider{
    -webkit-appearance:none; width:100%; height:6px; border-radius:999px; background:var(--surface-2); outline:none;
  }
  input[type=range].slider::-webkit-slider-thumb{
    -webkit-appearance:none; width:20px; height:20px; border-radius:50%; background:var(--primary);
    border:3px solid white; box-shadow:0 1px 4px rgba(0,0,0,0.25); cursor:pointer; margin-top:0px;
  }
  input[type=range].slider::-moz-range-thumb{
    width:20px; height:20px; border-radius:50%; background:var(--primary); border:3px solid white;
    box-shadow:0 1px 4px rgba(0,0,0,0.25); cursor:pointer;
  }

  table.data-table{width:100%; border-collapse:collapse; font-size:13.5px;}
  table.data-table thead th{
    text-align:left; font-size:11.5px; text-transform:uppercase; letter-spacing:.04em;
    color:var(--ink-soft); font-weight:700; padding:0 12px 10px 12px; border-bottom:1px solid var(--border);
  }
  table.data-table tbody td{padding:12px; border-bottom:1px solid var(--border); vertical-align:middle;}
  table.data-table tbody tr:last-child td{border-bottom:none;}
  table.data-table tbody tr{transition:background .12s ease;}
  table.data-table tbody tr:hover{background:var(--surface-2);}

  .toast{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:white; padding:11px 20px; border-radius:12px; font-size:13.5px; font-weight:600;
    opacity:0; pointer-events:none; transition:all .25s cubic-bezier(.4,0,.2,1); z-index:200; box-shadow:0 8px 24px rgba(0,0,0,0.2);
    display:flex; align-items:center; gap:8px;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto;}

  /* Bottom nav (mobile) */
  .bottom-nav{
    display:none; position:fixed; bottom:0; left:0; right:0; background:var(--surface);
    border-top:1px solid var(--border); padding:8px 4px calc(env(safe-area-inset-bottom,0px) + 6px) 4px;
    z-index:100; box-shadow:0 -2px 12px rgba(0,0,0,0.05);
  }
  .bottom-nav-inner{display:flex; justify-content:space-around;}
  .bottom-nav-item{
    display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--ink-soft);
    font-size:10.5px; font-weight:600; padding:5px 8px; border-radius:12px; transition:color .15s ease;
  }
  .bottom-nav-item svg{width:21px;height:21px;}
  .bottom-nav-item.active{color:var(--primary);}

  .modal-backdrop{
    position:fixed; inset:0; background:rgba(15,25,26,0.45); z-index:150; display:none;
    align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(2px);
  }
  .modal-backdrop.show{display:flex;}
  .modal-box{background:var(--surface); border-radius:18px; padding:24px; width:100%; max-width:440px; max-height:88vh; overflow-y:auto; animation:fadeUp .2s ease;}

  @media (max-width:860px){
    .sidebar{display:none;}
    .main-area{padding:18px 16px 92px 16px;}
    .bottom-nav{display:block;}
  }
</style>
</head>

<script>
/* =========================================================================
   1. ÉTAT GLOBAL DE L'APPLICATION
   ========================================================================= */
const STORAGE_DB_NAME = 'asbl-gestion-db';
const STORAGE_DB_VERSION = 2;
const STORAGE_STORE_NAME = 'handles';
const STORAGE_HANDLE_KEY = 'projectFileHandle';
const PROJECTS_STORE_NAME = 'savedProjects';
const LOCAL_CACHE_KEY = 'asbl_gestion_local_cache_v1';

function creerEtatVide(){
  return {
    project: {
      name: 'Mon projet ASBL',
      description: '',
      objectives: '',
      startDate: '',
      endDate: '',
      status: 'planification'
    },
    team: [],
    tasks: [],
    expenses: [],
    revenues: [],
    executionSessions: [],
    labor: [],
    labelPricing: {},
    studentPricing: {},
    simulator: {
      participants: 50,
      ticketPrice: 20
    },
    meta: {
      createdAt: new Date().toISOString(),
      lastModified: new Date().toISOString()
    }
  };
}

let state = creerEtatVide();
let fileHandle = null;
let isMobileFileMode = false;
let autosaveTimer = null;
let currentView = 'accueil';
let profitChartInstance = null;
let editingTaskId = null;
let editingMemberId = null;
let editingExpenseId = null;
let editingRevenueId = null;
let editingSessionId = null;
// Clés (libellés normalisés) des dossiers de sessions actuellement repliés. Vide par
// défaut = tout est déplié à l'ouverture, comme avant ce regroupement.
let libellesSessionsReplies = new Set();
// Sous-dossiers "date" à l'intérieur d'un libellé : ceux-ci sont REPLIÉS par défaut
// (contrairement aux libellés), donc on retient plutôt ceux qui sont OUVERTS.
// Clé = libelleKey + '||' + date
let datesSessionsOuvertes = new Set();
// Idem pour les dossiers de libellé dans la section Rentabilité par élève.
let libellesElevesReplies = new Set();
let editingLaborId = null;

/* =========================================================================
   SYNCHRONISATION TEMPS RÉEL ENTRE APPAREILS (Supabase)
   =========================================================================
   PRINCIPE : chaque équipe a UNE ligne dans Supabase, mais DEUX codes :
   - un « code modification » (rôle éditeur : peut tout changer)
   - un « code consultation » (rôle lecture seule : peut seulement regarder)
   Créer une équipe nécessite le mot de passe administrateur ci-dessous.

   ⚠️ CONFIGURATION REQUISE avant déploiement :
   - SUPABASE_URL / SUPABASE_ANON_KEY : vos identifiants Supabase
   - ADMIN_PASSWORD : un mot de passe de votre choix, à ne communiquer
     qu'aux personnes autorisées à créer de nouvelles équipes.

   ⚠️ LIMITE DE SÉCURITÉ HONNÊTE : ce mot de passe est vérifié uniquement
   dans ce fichier (côté navigateur). Il décourage une utilisation
   accidentelle ou non autorisée par un membre de l'équipe, mais une
   personne techniquement capable d'inspecter le code de la page pourrait
   le contourner. Pour une vraie protection à toute épreuve, il faudrait
   un compte utilisateur par personne — dites-le-moi si vous voulez qu'on
   mette ça en place plus tard.
   ========================================================================= */
const SUPABASE_URL = 'https://axihduusjdpxbpzohajd.supabase.co';        // ex : https://xxxxxxxx.supabase.co
const SUPABASE_ANON_KEY = 'sb_publishable_rr6dnokRb9Lgik33AfAucQ_sKt_FR6o';
const ADMIN_PASSWORD = '8uym9vhaug5f8j'; // choisissez-en un vous-même

const SYNC_TABLE = 'asbl_projects';
const SYNC_STORAGE_KEY = 'asbl_sync_v2';           // { projectId, code, role, editCode, viewCode }
const SYNC_PROJECTS_LIST_KEY = 'asbl_sync_projects_v1'; // [{ projectId, nom, role, editCode, viewCode, lastOpened }]
const CLIENT_ID_KEY = 'asbl_client_id';

let supabaseClient = null;
let syncProjectId = null;
let syncCode = null;
let syncRole = null;
let syncEditCode = null;
let syncViewCode = null;
let syncChannel = null;
let syncPushTimer = null;
let syncStatus = 'non-configure';

function obtenirIdClient(){
  let id = localStorage.getItem(CLIENT_ID_KEY);
  if(!id){
    id = 'client_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 10);
    localStorage.setItem(CLIENT_ID_KEY, id);
  }
  return id;
}
const idClientActuel = obtenirIdClient();

function supabaseEstConfigure(){
  return !!SUPABASE_URL && SUPABASE_URL.indexOf('https://') === 0 &&
         !!SUPABASE_ANON_KEY && SUPABASE_ANON_KEY.length > 20;
}

function initialiserSupabase(){
  if(!supabaseEstConfigure()) { syncStatus = 'non-configure'; return; }
  if(!syncProjectId) syncStatus = 'pret';
  if(supabaseClient) return;
  supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
}

function genererCodeAleatoire(){
  const alphabet = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for(let i = 0; i < 6; i++) code += alphabet[Math.floor(Math.random() * alphabet.length)];
  return code;
}

function estLectureSeule(){
  return syncRole === 'lecture';
}

function appliquerModeLectureSeule(){
  document.body.classList.toggle('mode-lecture-seule', estLectureSeule());
  const banniere = document.getElementById('banniere-lecture-seule');
  if(banniere) banniere.style.display = estLectureSeule() ? 'flex' : 'none';
}

/* =========================================================================
   LISTE DES PROJETS SYNCHRONISÉS CONNUS SUR CET APPAREIL
   (équivalent, pour le cloud, de la « liste des projets enregistrés »
   qu'on a déjà pour les fichiers locaux)
   ========================================================================= */
function obtenirProjetsSyncConnus(){
  try{ return JSON.parse(localStorage.getItem(SYNC_PROJECTS_LIST_KEY) || '[]'); }catch(e){ return []; }
}
function sauvegarderProjetsSyncConnus(liste){
  try{ localStorage.setItem(SYNC_PROJECTS_LIST_KEY, JSON.stringify(liste)); }catch(e){}
}
function ajouterOuMettreAJourProjetConnu(entree){
  const liste = obtenirProjetsSyncConnus();
  const idx = liste.findIndex(p => p.projectId === entree.projectId);
  if(idx >= 0) liste[idx] = Object.assign({}, liste[idx], entree);
  else liste.unshift(entree);
  sauvegarderProjetsSyncConnus(liste);
}
function retirerProjetSyncConnu(projectId, evenement){
  if(evenement) evenement.stopPropagation();
  sauvegarderProjetsSyncConnus(obtenirProjetsSyncConnus().filter(p => p.projectId !== projectId));
  afficherToast('Projet retiré de la liste (les données restent en ligne).', 'info');
  if(currentView === 'sync') rendreSync();
}

/* --- Demande le mot de passe admin avant de créer un projet --- */
function demanderMotDePasseAdminEtCreer(modeVierge){
  const saisie = window.prompt("Mot de passe administrateur requis pour créer un nouveau projet :");
  if(saisie === null) return;
  if(saisie !== ADMIN_PASSWORD){
    afficherToast('Mot de passe administrateur incorrect.', 'erreur');
    return;
  }
  const nomProjet = (window.prompt("Nom de ce nouveau projet (ex. « Fête annuelle 2027 ») :") || '').trim();
  if(!nomProjet){ afficherToast('Nom de projet requis.', 'erreur'); return; }
  const donneesInitiales = modeVierge ? creerEtatVide() : JSON.parse(JSON.stringify(state));
  donneesInitiales.project.name = nomProjet;
  creerProjetSyncAvecDonnees(donneesInitiales, nomProjet);
}

/* --- Créé une nouvelle ligne Supabase avec les données fournies, et l'ouvre --- */
async function creerProjetSyncAvecDonnees(donnees, nomProjet){
  if(!supabaseEstConfigure()){
    afficherToast("La synchronisation n'est pas encore configurée.", 'erreur');
    return;
  }
  if(!demanderPrenomSiBesoin()) return;
  initialiserSupabase();
  const codeEdition = genererCodeAleatoire();
  const codeLecture = genererCodeAleatoire();
  syncStatus = 'connexion';
  mettreAJourStatutSync();
  try{
    const { data: ligne, error } = await supabaseClient.from(SYNC_TABLE).insert({
      edit_code: codeEdition,
      view_code: codeLecture,
      data: donnees,
      updated_at: new Date().toISOString(),
      updated_by: idClientActuel
    }).select().single();
    if(error) throw error;

    state = fusionnerAvecEtatVide(ligne.data);
    syncProjectId = ligne.id;
    syncCode = codeEdition;
    syncRole = 'editeur';
    syncEditCode = codeEdition;
    syncViewCode = codeLecture;
    sauvegarderSyncLocalement();
    ajouterOuMettreAJourProjetConnu({
      projectId: ligne.id, nom: nomProjet, role: 'editeur',
      editCode: codeEdition, viewCode: codeLecture, lastOpened: new Date().toISOString()
    });
    souscrireAuTempsReel();
    syncStatus = 'connecte';
    enregistrerAction('a créé le projet « ' + nomProjet + ' »');
    afficherToast('Projet « ' + nomProjet + ' » créé avec succès.', 'succes');
    naviguerVers('accueil');
    rendreTout();
  }catch(erreur){
    console.error(erreur);
    syncStatus = 'erreur';
    afficherToast("Impossible de créer le projet. Vérifie la configuration Supabase.", 'erreur');
  }
  appliquerModeLectureSeule();
  mettreAJourStatutSync();
  if(currentView === 'sync') rendreSync();
}

/* --- Importer un fichier JSON existant comme NOUVEAU projet synchronisé --- */
function importerFichierCommeNouveauProjetSync(fichierInput){
  const fichier = fichierInput.files && fichierInput.files[0];
  if(!fichier) return;
  const saisie = window.prompt("Mot de passe administrateur requis pour créer un nouveau projet :");
  if(saisie === null){ fichierInput.value = ''; return; }
  if(saisie !== ADMIN_PASSWORD){
    afficherToast('Mot de passe administrateur incorrect.', 'erreur');
    fichierInput.value = '';
    return;
  }
  const lecteur = new FileReader();
  lecteur.onload = () => {
    try{
      const donnees = fusionnerAvecEtatVide(JSON.parse(lecteur.result));
      const nomProjet = donnees.project.name || 'Projet importé';
      creerProjetSyncAvecDonnees(donnees, nomProjet);
    }catch(erreur){
      afficherToast("Le fichier sélectionné n'est pas valide.", 'erreur');
    }
    fichierInput.value = '';
  };
  lecteur.readAsText(fichier);
}

/* --- Rejoindre un projet existant avec un code (édition OU lecture) --- */
async function rejoindreCodeSync(code){
  const codePropre = (code || '').trim().toUpperCase();
  if(!codePropre){ afficherToast('Entre un code valide.', 'erreur'); return; }
  if(!supabaseEstConfigure()){
    afficherToast("La synchronisation n'est pas encore configurée.", 'erreur');
    return;
  }
  if(!demanderPrenomSiBesoin()) return;
  initialiserSupabase();
  syncStatus = 'connexion';
  mettreAJourStatutSync();
  try{
    const { data: ligne, error } = await supabaseClient
      .from(SYNC_TABLE)
      .select('*')
      .or('edit_code.eq.' + codePropre + ',view_code.eq.' + codePropre)
      .maybeSingle();
    if(error) throw error;
    if(!ligne){
      afficherToast("Aucun projet ne correspond à ce code.", 'erreur');
      syncStatus = 'erreur';
      mettreAJourStatutSync();
      return;
    }
    state = fusionnerAvecEtatVide(ligne.data);
    syncProjectId = ligne.id;
    syncCode = codePropre;
    syncRole = (ligne.edit_code === codePropre) ? 'editeur' : 'lecture';
    syncEditCode = (syncRole === 'editeur') ? ligne.edit_code : null;
    syncViewCode = ligne.view_code;
    const nomProjet = (ligne.data && ligne.data.project && ligne.data.project.name) || 'Projet sans nom';
    sauvegarderSyncLocalement();
    ajouterOuMettreAJourProjetConnu({
      projectId: ligne.id, nom: nomProjet, role: syncRole,
      editCode: syncEditCode, viewCode: syncViewCode, lastOpened: new Date().toISOString()
    });
    souscrireAuTempsReel();
    syncStatus = 'connecte';
    afficherToast(
      syncRole === 'editeur' ? 'Connecté en modification.' : 'Connecté en consultation seule.',
      'succes'
    );
    naviguerVers('accueil');
    rendreTout();
  }catch(erreur){
    console.error(erreur);
    syncStatus = 'erreur';
    afficherToast("Impossible de rejoindre ce code.", 'erreur');
  }
  appliquerModeLectureSeule();
  mettreAJourStatutSync();
  if(currentView === 'sync') rendreSync();
}

async function ouvrirProjetSyncDepuisListe(projectId){

function sauvegarderSyncLocalement(){
  try{
    localStorage.setItem(SYNC_STORAGE_KEY, JSON.stringify({
      projectId: syncProjectId, code: syncCode, role: syncRole,
      editCode: syncEditCode, viewCode: syncViewCode
    }));
  }catch(e){}
}

/* --- Ferme le projet actuellement ouvert (reste dans la liste, pour rouvrir plus tard) --- */
function fermerProjetActifSync(){
  if(syncChannel){ supabaseClient.removeChannel(syncChannel); syncChannel = null; }
  syncProjectId = null; syncCode = null; syncRole = null; syncEditCode = null; syncViewCode = null;
  localStorage.removeItem(SYNC_STORAGE_KEY);
  syncStatus = supabaseEstConfigure() ? 'pret' : 'non-configure';
  appliquerModeLectureSeule();
  mettreAJourStatutSync();
  if(currentView === 'sync') rendreSync();
}


function souscrireAuTempsReel(){
  if(!supabaseClient || !syncProjectId) return;
  if(syncChannel) supabaseClient.removeChannel(syncChannel);

  syncChannel = supabaseClient
    .channel('sync-' + syncProjectId)
    .on('postgres_changes',
      { event: 'UPDATE', schema: 'public', table: SYNC_TABLE, filter: 'id=eq.' + syncProjectId },
      (payload) => {
        if(payload.new.updated_by === idClientActuel) return;
        state = fusionnerAvecEtatVide(payload.new.data);
        rendreTout();
        afficherToast('Mis à jour depuis un autre appareil.', 'info');
      }
    )
    .subscribe((statut) => {
      if(statut === 'SUBSCRIBED'){ syncStatus = 'connecte'; }
      else if(statut === 'CHANNEL_ERROR' || statut === 'TIMED_OUT'){ syncStatus = 'erreur'; }
      mettreAJourStatutSync();
    });
}

/* --- Envoi vers le cloud : jamais si on est en lecture seule --- */
function planifierEnvoiCloud(){
  if(!syncProjectId || !supabaseClient) return;
  if(estLectureSeule()) return; // sécurité côté client : un lecteur n'écrit jamais
  clearTimeout(syncPushTimer);
  syncPushTimer = setTimeout(async () => {
    try{
      const { error } = await supabaseClient.from(SYNC_TABLE).update({
        data: state,
        updated_at: new Date().toISOString(),
        updated_by: idClientActuel
      }).eq('id', syncProjectId);
      if(error) throw error;
      syncStatus = 'connecte';
    }catch(erreur){
      console.error(erreur);
      syncStatus = 'erreur';
    }
    mettreAJourStatutSync();
  }, 700);
}

function reprendreSyncSiExistant(){
  if(!supabaseEstConfigure()) return;
  let sauvegarde = null;
  try{ sauvegarde = JSON.parse(localStorage.getItem(SYNC_STORAGE_KEY) || 'null'); }catch(e){}
  if(!sauvegarde || !sauvegarde.projectId) return;
  initialiserSupabase();
  syncProjectId = sauvegarde.projectId;
  syncCode = sauvegarde.code;
  syncRole = sauvegarde.role;
  syncEditCode = sauvegarde.editCode || null;
  syncViewCode = sauvegarde.viewCode || null;
  syncStatus = 'connexion';
  appliquerModeLectureSeule();
  souscrireAuTempsReel();
}

function mettreAJourStatutSync(){
  const pastille = document.getElementById('sync-status-dot');
  const texte = document.getElementById('sync-status-text');
  if(!pastille || !texte) return;
  const libelleRole = syncRole === 'editeur' ? ' (modification)' : syncRole === 'lecture' ? ' (lecture seule)' : '';
  const couleurs = {
    'non-configure': ['var(--ink-soft)', 'Synchronisation non configurée'],
    'pret': ['var(--accent)', 'Prêt — crée, importe ou rejoins un projet'],
    'deconnecte': ['var(--ink-soft)', 'Synchronisation désactivée'],
    'connexion': ['var(--accent)', 'Connexion en cours…'],
    'connecte': ['var(--success)', 'Synchronisé' + libelleRole],
    'erreur': ['var(--danger)', 'Erreur de synchronisation']
  };
  const [couleur, libelle] = couleurs[syncStatus] || couleurs['non-configure'];
  pastille.style.background = couleur;
  texte.textContent = libelle;

  const pastilleVue = document.getElementById('sync-status-dot-view');
  const texteVue = document.getElementById('sync-status-text-view');
  if(pastilleVue) pastilleVue.style.background = couleur;
  if(texteVue) texteVue.textContent = libelle;
}

function genererId(){
  return 'id_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 9);
}

/* =========================================================================
   4. INDEXEDDB — MÉMORISATION DU HANDLE DE FICHIER ENTRE LES SESSIONS
   ========================================================================= */
function ouvrirBaseHandles(){
  return new Promise((resolve, reject) => {
    const requete = indexedDB.open(STORAGE_DB_NAME, STORAGE_DB_VERSION);
    requete.onupgradeneeded = (evenement) => {
      const db = evenement.target.result;
      if(!db.objectStoreNames.contains(STORAGE_STORE_NAME)){
        db.createObjectStore(STORAGE_STORE_NAME);
      }
      if(!db.objectStoreNames.contains(PROJECTS_STORE_NAME)){
        db.createObjectStore(PROJECTS_STORE_NAME, { keyPath: 'id' });
      }
    };
    requete.onsuccess = () => resolve(requete.result);
    requete.onerror = () => reject(requete.error);
  });
}

async function enregistrerHandleEnBase(handle){
  try{
    const db = await ouvrirBaseHandles();
    await new Promise((resolve, reject) => {
      const tx = db.transaction(STORAGE_STORE_NAME, 'readwrite');
      tx.objectStore(STORAGE_STORE_NAME).put(handle, STORAGE_HANDLE_KEY);
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    });
    db.close();
  }catch(erreur){
    console.warn('Impossible de mémoriser le handle de fichier :', erreur);
  }
}

async function chargerHandleDepuisBase(){
  try{
    const db = await ouvrirBaseHandles();
    const handle = await new Promise((resolve, reject) => {
      const tx = db.transaction(STORAGE_STORE_NAME, 'readonly');
      const requete = tx.objectStore(STORAGE_STORE_NAME).get(STORAGE_HANDLE_KEY);
      requete.onsuccess = () => resolve(requete.result || null);
      requete.onerror = () => reject(requete.error);
    });
    db.close();
    return handle;
  }catch(erreur){
    console.warn('Impossible de récupérer le handle de fichier :', erreur);
    return null;
  }
}

async function effacerHandleEnBase(){
  try{
    const db = await ouvrirBaseHandles();
    await new Promise((resolve, reject) => {
      const tx = db.transaction(STORAGE_STORE_NAME, 'readwrite');
      tx.objectStore(STORAGE_STORE_NAME).delete(STORAGE_HANDLE_KEY);
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    });
    db.close();
  }catch(erreur){
    console.warn('Impossible de supprimer le handle de fichier :', erreur);
  }
}

/* =========================================================================
   4bis. INDEXEDDB — LISTE DES PROJETS ENREGISTRÉS (accès rapide en un clic)
   ========================================================================= */
function formaterDateCourte(dateStr){
  if(!dateStr) return '';
  const d = new Date(dateStr);
  if(isNaN(d.getTime())) return '';
  return d.toLocaleDateString('fr-BE', { day: 'numeric', month: 'long' });
}

function calculerLibelleProjetCourant(){
  const nom = state.project.name || 'Projet sans nom';
  let dateLabel = '';
  if(state.executionSessions && state.executionSessions.length > 0){
    const premiere = state.executionSessions.slice().sort((a, b) => (a.date || '').localeCompare(b.date || ''))[0];
    dateLabel = formaterDateCourte(premiere.date);
  }
  return { nom, dateLabel };
}

async function listerProjetsEnregistres(){
  try{
    const db = await ouvrirBaseHandles();
    const liste = await new Promise((resolve, reject) => {
      const tx = db.transaction(PROJECTS_STORE_NAME, 'readonly');
      const requete = tx.objectStore(PROJECTS_STORE_NAME).getAll();
      requete.onsuccess = () => resolve(requete.result || []);
      requete.onerror = () => reject(requete.error);
    });
    db.close();
    return liste.sort((a, b) => (b.lastSaved || '').localeCompare(a.lastSaved || ''));
  }catch(erreur){
    console.warn('Impossible de lister les projets enregistrés :', erreur);
    return [];
  }
}

async function ajouterOuMettreAJourProjetDansListe(handle){
  try{
    const { nom, dateLabel } = calculerLibelleProjetCourant();
    const db = await ouvrirBaseHandles();
    const entrees = await new Promise((resolve, reject) => {
      const tx = db.transaction(PROJECTS_STORE_NAME, 'readonly');
      const requete = tx.objectStore(PROJECTS_STORE_NAME).getAll();
      requete.onsuccess = () => resolve(requete.result || []);
      requete.onerror = () => reject(requete.error);
    });

    let entreeExistante = null;
    for(const entree of entrees){
      try{
        if(entree.handle && typeof entree.handle.isSameEntry === 'function' && await entree.handle.isSameEntry(handle)){
          entreeExistante = entree;
          break;
        }
      }catch(e){ /* handle invalide, on ignore */ }
    }

    const enregistrement = {
      id: entreeExistante ? entreeExistante.id : genererId(),
      name: nom,
      dateLabel: dateLabel,
      handle: handle,
      lastSaved: new Date().toISOString()
    };

    await new Promise((resolve, reject) => {
      const tx = db.transaction(PROJECTS_STORE_NAME, 'readwrite');
      tx.objectStore(PROJECTS_STORE_NAME).put(enregistrement);
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    });
    db.close();
  }catch(erreur){
    console.warn('Impossible de mettre à jour la liste des projets enregistrés :', erreur);
  }
}

async function supprimerProjetDeListe(id){
  try{
    const db = await ouvrirBaseHandles();
    await new Promise((resolve, reject) => {
      const tx = db.transaction(PROJECTS_STORE_NAME, 'readwrite');
      tx.objectStore(PROJECTS_STORE_NAME).delete(id);
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    });
    db.close();
  }catch(erreur){
    console.warn('Impossible de retirer ce projet de la liste :', erreur);
  }
}

async function creerNouveauFichierProjet(){

async function ouvrirFichierProjetExistant(){
  if(!supportFileSystemAccess()){

    naviguerVers('accueil');
    rendreTout();
  }catch(erreur){
    if(erreur && erreur.name !== 'AbortError'){
      console.error(erreur);
      afficherToast("L'ouverture du fichier a échoué ou le fichier est invalide.", 'erreur');
    }
  }
}

function fusionnerAvecEtatVide(donnees){
  const base = creerEtatVide();
  return {
    project: Object.assign({}, base.project, donnees.project || {}),
    team: Array.isArray(donnees.team) ? donnees.team : [],
    tasks: Array.isArray(donnees.tasks) ? donnees.tasks : [],
    expenses: Array.isArray(donnees.expenses) ? donnees.expenses : [],
    revenues: Array.isArray(donnees.revenues) ? donnees.revenues : [],
    executionSessions: Array.isArray(donnees.executionSessions) ? donnees.executionSessions : [],
    labor: Array.isArray(donnees.labor) ? donnees.labor : [],
    labelPricing: (donnees.labelPricing && typeof donnees.labelPricing === 'object' && !Array.isArray(donnees.labelPricing)) ? donnees.labelPricing : {},
    studentPricing: (donnees.studentPricing && typeof donnees.studentPricing === 'object' && !Array.isArray(donnees.studentPricing)) ? donnees.studentPricing : {},
    simulator: Object.assign({}, base.simulator, donnees.simulator || {}),
    meta: Object.assign({}, base.meta, donnees.meta || {})
  };
}

async function verifierEtRestaurerPermission(handle){
  try{
    const options = { mode: 'readwrite' };
    const permissionActuelle = await handle.queryPermission(options);
    if(permissionActuelle === 'granted') return true;
    return false;
  }catch(erreur){
    return false;
  }
}

async function demanderPermission(handle){
  try{
    const options = { mode: 'readwrite' };
    const resultat = await handle.requestPermission(options);
    return resultat === 'granted';
  }catch(erreur){
    return false;
  }
}

async function ecrireEtatDansFichier(){
  if(!fileHandle) return false;
  try{
    state.meta.lastModified = new Date().toISOString();
    const writable = await fileHandle.createWritable();
    await writable.write(JSON.stringify(state, null, 2));
    await writable.close();
    return true;
  }catch(erreur){
    console.error('Échec de l\'écriture du fichier physique :', erreur);
    afficherToast("La sauvegarde automatique a échoué. Vérifie l'accès au fichier.", 'erreur');
    return false;
  }
}

/* =========================================================================
   JOURNAL D'ACTIVITÉ — « qui a fait quoi, et quand »
   ========================================================================= */
const PRENOM_KEY = 'asbl_prenom_utilisateur';
let prenomUtilisateur = localStorage.getItem(PRENOM_KEY) || null;

function demanderPrenomSiBesoin(){
  if(prenomUtilisateur) return prenomUtilisateur;
  let saisie = '';
  while(!saisie){
    saisie = (window.prompt("Quel est ton prénom ? (affiché dans le journal d'activité de l'équipe)") || '').trim();
    if(saisie === null) return null;
  }
  prenomUtilisateur = saisie;
  localStorage.setItem(PRENOM_KEY, prenomUtilisateur);
  return prenomUtilisateur;
}

function enregistrerAction(description){
  if(!state.meta.journal) state.meta.journal = [];
  state.meta.journal.unshift({
    auteur: prenomUtilisateur || 'Inconnu',
    action: description,
    date: new Date().toISOString()
  });
  // On garde un historique raisonnable (200 dernières actions) pour ne pas
  // faire grossir le projet indéfiniment.
  if(state.meta.journal.length > 200) state.meta.journal.length = 200;
  planifierSauvegarde();
}

function planifierSauvegarde(){
  state.meta.lastModified = new Date().toISOString();

  // Filet de sécurité universel : on garde toujours une copie locale sur
  // cet appareil, que l'utilisateur utilise un fichier physique, le cloud,
  // les deux, ou ni l'un ni l'autre pour l'instant.
  try{ localStorage.setItem(LOCAL_CACHE_KEY, JSON.stringify(state)); }catch(e){}

  // Synchronisation cloud : envoyée à chaque modification, indépendamment
  // du mode de sauvegarde locale (fichier physique ou cache mobile).
  planifierEnvoiCloud();

  if(isMobileFileMode){
    mettreAJourStatutFichier();
    return;
  }
  if(!fileHandle) return;
  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(async () => {
    const ok = await ecrireEtatDansFichier();
    if(ok) mettreAJourStatutFichier();
  }, 450);
}

/* --- Ouverture en un clic depuis la liste des projets enregistrés --- */
async function ouvrirProjetDepuisListe(id){
  try{
    const db = await ouvrirBaseHandles();
    const entree = await new Promise((resolve, reject) => {
      const tx = db.transaction(PROJECTS_STORE_NAME, 'readonly');
      const requete = tx.objectStore(PROJECTS_STORE_NAME).get(id);
      requete.onsuccess = () => resolve(requete.result || null);
      requete.onerror = () => reject(requete.error);
    });
    db.close();
    if(!entree || !entree.handle){
      afficherToast("Ce projet n'est plus accessible.", 'erreur');
      return;
    }

    const dejaAutorise = await verifierEtRestaurerPermission(entree.handle);
    const autorise = dejaAutorise || await demanderPermission(entree.handle);
    if(!autorise){
      afficherToast("Accès au fichier refusé.", 'erreur');
      return;
    }

    const fichier = await entree.handle.getFile();
    const texte = await fichier.text();
    const donnees = JSON.parse(texte);
    state = fusionnerAvecEtatVide(donnees);
    fileHandle = entree.handle;
    await enregistrerHandleEnBase(entree.handle);
    mettreAJourStatutFichier();
    afficherToast('Projet « ' + (entree.name || 'sans nom') + ' » ouvert.', 'succes');
    naviguerVers('accueil');
    rendreTout();
  }catch(erreur){
    console.error(erreur);
    afficherToast("Impossible d'ouvrir ce projet.", 'erreur');
  }
}

  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);

  const nomFichier = (state.project.name || 'projet-asbl').toLowerCase().replace(/[^a-z0-9]+/g, '-') + '.json';

  const lecteur = new FileReader();
  lecteur.onload = () => {

async function initialiserPersistance(){
  isMobileFileMode = !supportFileSystemAccess();

  if(!isMobileFileMode){
    const handleSauvegarde = await chargerHandleDepuisBase();
    if(handleSauvegarde){
      const dejaAutorise = await verifierEtRestaurerPermission(handleSauvegarde);
      if(dejaAutorise){
        try{
          const fichier = await handleSauvegarde.getFile();
          const texte = await fichier.text();
          state = fusionnerAvecEtatVide(JSON.parse(texte));
          fileHandle = handleSauvegarde;
        }catch(erreur){
          console.warn('Handle enregistré invalide, reconnexion nécessaire.', erreur);

      }
    }
    // Pas de fichier physique connecté : on retombe sur la dernière copie
    // locale connue de cet appareil, plutôt que de repartir d'un projet vide.
    if(!fileHandle){
      try{
        const cache = localStorage.getItem(LOCAL_CACHE_KEY);

      }catch(e){}
    }

    try{
      const cache = localStorage.getItem(LOCAL_CACHE_KEY);
      if(cache) state = fusionnerAvecEtatVide(JSON.parse(cache));
    }catch(e){}

  mettreAJourStatutFichier();

/* =========================================================================
   7. MOTEUR DE CALCUL MÉTIER
   ========================================================================= */
function trouverMembre(id){
  return state.team.find(m => m.id === id) || null;
}

function trouverSession(id){
  return state.executionSessions.find(s => s.id === id) || null;
}

/* --- Sessions d'exécution : base du prorata --- */
function calculerNbJoursExecution(){
  return state.executionSessions.length;
}

function calculerHeuresExecutionTotal(){
  return state.executionSessions.reduce((somme, s) => somme + (Number(s.hours) || 0), 0);
}

/* --- Plage horaire : calcule une durée en heures à partir d'un début et d'une fin (HH:MM) ---
   Si la fin est avant (ou égale à) le début, on considère que la session traverse minuit. */
function calculerDureeDepuisPlage(debut, fin){
  if(!debut || !fin) return 0;
  const [hD, mD] = debut.split(':').map(Number);
  const [hF, mF] = fin.split(':').map(Number);
  if([hD,mD,hF,mF].some(v => Number.isNaN(v))) return 0;
  let minutesDebut = hD * 60 + mD;
  let minutesFin = hF * 60 + mF;
  if(minutesFin <= minutesDebut) minutesFin += 24 * 60; // passage de minuit
  return Math.round(((minutesFin - minutesDebut) / 60) * 100) / 100;
}

/* --- Regroupe les sessions d'exécution par libellé et additionne leurs heures --- */
/* --- Normalise un libellé pour le regroupement : ignore majuscules, accents, espaces
   en trop et un "s" final par mot (singulier/pluriel) — mais ne fusionne jamais deux
   mots réellement différents (ex. "Concert chœur" reste distinct de "Répétitions chœur"). --- */
function normaliserLibelle(label){
  if(!label) return '';
  return label
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '') // enlève les accents
    .replace(/œ/gi, 'oe').replace(/æ/gi, 'ae')
    .trim()
    .toLowerCase()
    .replace(/\s+/g, ' ')
    .split(' ')
    .map(mot => mot.replace(/s$/, ''))
    .join(' ');
}

function calculerTotauxParLibelle(){
  const groupes = {};
  // Parcours dans l'ordre d'ajout des sessions : le premier texte saisi pour un
  // libellé (même normalisé) sert de texte affiché pour tout le groupe.
  state.executionSessions.forEach(s => {
    const texteBrut = (s.label && s.label.trim()) ? s.label.trim() : '';
    const cle = texteBrut ? normaliserLibelle(texteBrut) : '__sans_libelle__';
    if(!groupes[cle]) groupes[cle] = { key: cle, label: cle === '__sans_libelle__' ? 'Sans libellé' : texteBrut, heures: 0 };
    groupes[cle].heures += Number(s.hours) || 0;
  });
  return Object.values(groupes).sort((a,b) => a.label.localeCompare(b.label));
}

/* --- Tarification propre à chaque libellé (Orchestre, Chœur...) : à l'unité ou au forfait --- */
function obtenirPricingLibelle(label){
  const config = state.labelPricing[label];
  return {
    mode: config && config.mode === 'forfait' ? 'forfait' : 'unite',
    unitPrice: config ? Number(config.unitPrice) || 0 : 0,
    participants: config ? Number(config.participants) || 0 : 0,
    forfaitAmount: config ? Number(config.forfaitAmount) || 0 : 0
  };
}

function obtenirParticipantsPourLibelle(label){
  return obtenirPricingLibelle(label).participants;
}

function calculerRecettePropreLibelle(label){
  const pricing = obtenirPricingLibelle(label);
  // Forfait ou à l'unité : dans les deux cas, un prix par participant × le nombre de
  // participants. Le "forfait" représente le prix demandé à CHAQUE participant pour
  // l'ensemble des dates du libellé (pas un montant unique indépendant des participants).
  const prixParParticipant = pricing.mode === 'forfait' ? pricing.forfaitAmount : pricing.unitPrice;
  return prixParParticipant * pricing.participants;
}

function mettreAJourPricingLibelle(label, champ, valeur){
  if(!state.labelPricing[label]) state.labelPricing[label] = { mode: 'unite', unitPrice: 0, participants: 0, forfaitAmount: 0 };
  if(champ === 'mode'){
    state.labelPricing[label].mode = valeur === 'forfait' ? 'forfait' : 'unite';
  }else{
    state.labelPricing[label][champ] = parseFloat(valeur) || 0;
  }
  planifierSauvegarde();
  const m = calculerMetriques();
  const conteneur = document.getElementById('sim-repartition-labels');
  if(conteneur){
    conteneur.innerHTML = rendreRepartitionLabelsSimulateur(m);
    attacherEcouteursPricingLabels();
  }
}

/* --- Regroupe les sessions par élève (cours individuels) : uniquement les sessions
   où un élève a été renseigné. Même normalisation que pour les libellés. --- */
/* --- Renvoie la liste des élèves concernés par une session, qu'elle soit individuelle
   (un seul nom) ou de groupe (plusieurs noms) — avec compatibilité de l'ancien format
   à champ unique "student". --- */
function obtenirElevesSession(session){
  if(Array.isArray(session.students)) return session.students.map(n => (n || '').trim()).filter(Boolean);
  if(session.student && session.student.trim()) return [session.student.trim()];
  return [];
}

function calculerTotauxParEleve(){
  const groupes = {};
  state.executionSessions.forEach(s => {
    obtenirElevesSession(s).forEach(nom => {
      const cle = normaliserLibelle(nom);
      if(!groupes[cle]) groupes[cle] = { key: cle, label: nom, heures: 0 };
      groupes[cle].heures += Number(s.hours) || 0;
    });
  });
  return Object.values(groupes).sort((a,b) => a.label.localeCompare(b.label));
}

/* --- Regroupe les sessions par libellé, puis par élève à l'intérieur de chaque
   libellé : un même élève sur deux libellés différents (ex. Piano ET Guitare) a
   deux rentabilités bien séparées. --- */
function calculerTotauxParLibelleEtEleve(){
  const groupesLibelle = {};
  state.executionSessions.forEach(s => {
    const eleves = obtenirElevesSession(s);
    if(eleves.length === 0) return; // pas d'élève sur cette session : ignorée ici
    const texteLibelle = (s.label && s.label.trim()) ? s.label.trim() : '';
    const cleLibelle = texteLibelle ? normaliserLibelle(texteLibelle) : '__sans_libelle__';
    if(!groupesLibelle[cleLibelle]) groupesLibelle[cleLibelle] = {
      key: cleLibelle, label: cleLibelle === '__sans_libelle__' ? 'Sans libellé' : texteLibelle, eleves: {}
    };
    eleves.forEach(nom => {
      const cleEleve = normaliserLibelle(nom);
      if(!groupesLibelle[cleLibelle].eleves[cleEleve]) groupesLibelle[cleLibelle].eleves[cleEleve] = { key: cleEleve, label: nom, heures: 0 };
      groupesLibelle[cleLibelle].eleves[cleEleve].heures += Number(s.hours) || 0;
    });
  });
  return Object.values(groupesLibelle)
    .map(g => Object.assign({}, g, { eleves: Object.values(g.eleves).sort((a,b) => a.label.localeCompare(b.label)) }))
    .sort((a,b) => a.label.localeCompare(b.label));
}

/* --- Tarification propre à chaque élève, PAR LIBELLÉ (un même élève sur deux
   libellés différents a deux tarifications indépendantes) --- */
function obtenirPricingEleve(libelle, eleve){
  const config = state.studentPricing[libelle] && state.studentPricing[libelle][eleve];
  return {
    mode: config && config.mode === 'forfait' ? 'forfait' : 'unite',
    unitPrice: config ? Number(config.unitPrice) || 0 : 0,
    participants: config ? Number(config.participants) || 0 : 1,
    forfaitAmount: config ? Number(config.forfaitAmount) || 0 : 0
  };
}

function calculerRecettePropreEleve(libelle, eleve){
  const pricing = obtenirPricingEleve(libelle, eleve);
  const prixParParticipant = pricing.mode === 'forfait' ? pricing.forfaitAmount : pricing.unitPrice;
  return prixParParticipant * pricing.participants;
}

function mettreAJourPricingEleve(libelle, eleve, champ, valeur){
  if(!state.studentPricing[libelle]) state.studentPricing[libelle] = {};
  if(!state.studentPricing[libelle][eleve]) state.studentPricing[libelle][eleve] = { mode: 'unite', unitPrice: 0, participants: 1, forfaitAmount: 0 };
  if(champ === 'mode'){
    state.studentPricing[libelle][eleve].mode = valeur === 'forfait' ? 'forfait' : 'unite';
  }else{
    state.studentPricing[libelle][eleve][champ] = parseFloat(valeur) || 0;
  }
  planifierSauvegarde();
  const m = calculerMetriques();
  const conteneur = document.getElementById('sim-repartition-eleves');
  if(conteneur){
    conteneur.innerHTML = rendreRepartitionElevesSimulateur(m);
    attacherEcouteursPricingEleves();
    attacherEcouteursGroupesEleves();
  }
}


function libelleModeDepense(mode){
  return {
    ponctuel_fixe: 'Ponctuel — montant fixe',
    ponctuel_jour: 'Ponctuel — par jour d\'exécution',
    hebdo: 'Hebdomadaire (prorata)',
    mensuel: 'Mensuel (prorata)',
    annuel: 'Annuel (prorata)',
    horaire: 'Tarif horaire (× heures totales)',
    par_participant: 'Charge variable — par participant',
    unite_participants: 'À l\'unité (prix × participants propres)'
  }[mode] || mode;
}

/* --- Dépenses : calcul du montant attribué au projet selon le mode choisi --- */
function calculerMontantAttribueDepense(depense){
  const montant = Number(depense.amount) || 0;
  const nbJours = calculerNbJoursExecution();
  const heuresTotal = calculerHeuresExecutionTotal();
  switch(depense.mode){
    case 'ponctuel_fixe':
      return montant;
    case 'ponctuel_jour':
      return montant * nbJours;
    case 'hebdo':
      return (montant / 7) * nbJours;
    case 'mensuel':
      return (montant / 30) * nbJours;
    case 'annuel':
      return (montant / 365) * nbJours;
    case 'horaire':
      return montant * heuresTotal;
    case 'par_participant':
      return montant * obtenirParticipantsPourLibelle(depense.relatedLabel);
    default:
      return montant;
  }
}

function calculerDepensesProratees(){
  let total = 0;
  const lignes = state.expenses.map(d => {
    const montantAttribue = calculerMontantAttribueDepense(d);
    total += montantAttribue;
    return Object.assign({}, d, { montantAttribue });
  });
  return { lignes, total };
}

/* --- Recettes : même principe que les dépenses, + un mode "à l'unité" propre à la ligne --- */
function calculerMontantAttribueRecette(recette){
  if(recette.mode === 'unite_participants'){
    return (Number(recette.unitPrice) || 0) * (Number(recette.participants) || 0);
  }
  return calculerMontantAttribueDepense(recette);
}

function calculerRecettesProratees(){
  let total = 0;
  const lignes = state.revenues.map(r => {
    const montantAttribue = calculerMontantAttribueRecette(r);
    total += montantAttribue;
    return Object.assign({}, r, { montantAttribue });
  });
  return { lignes, total };
}

/* --- Main d'œuvre : deux phases (préparation / exécution), split salarié vs bénévole --- */
function calculerHeuresEntreeMainOeuvre(entree){
  if(entree.phase === 'preparation'){
    return (Number(entree.joursPreparation) || 0) * (Number(entree.heuresParJour) || 0);
  }
  return Number(entree.heures) || 0;
}

function calculerCoutMainOeuvre(){
  let coutPreparationSalarie = 0, coutExecutionSalarie = 0;
  let coutPreparationBenevole = 0, coutExecutionBenevole = 0;

  state.labor.forEach(entree => {
    const membre = trouverMembre(entree.memberId);
    if(!membre) return;
    const heures = calculerHeuresEntreeMainOeuvre(entree);
    const taux = Number(membre.hourlyRate) || 0;
    const cout = heures * taux;
    if(membre.type === 'salarie'){
      if(entree.phase === 'preparation') coutPreparationSalarie += cout; else coutExecutionSalarie += cout;
    }else{
      if(entree.phase === 'preparation') coutPreparationBenevole += cout; else coutExecutionBenevole += cout;
    }
  });

  return {
    coutPreparationSalarie, coutExecutionSalarie,
    coutTotalSalarie: coutPreparationSalarie + coutExecutionSalarie,
    coutPreparationBenevole, coutExecutionBenevole,
    coutTotalBenevole: coutPreparationBenevole + coutExecutionBenevole
  };
}

function calculerMetriques(){
  const depensesProratees = calculerDepensesProratees();
  const recettesProratees = calculerRecettesProratees();
  const mainOeuvre = calculerCoutMainOeuvre();

  const totalDepensesReelles = depensesProratees.total + mainOeuvre.coutTotalSalarie;
  const totalValorise = totalDepensesReelles + mainOeuvre.coutTotalBenevole;

  const totalTaches = state.tasks.length;
  const tachesTerminees = state.tasks.filter(t => t.status === 'termine').length;
  const tachesEnCours = state.tasks.filter(t => t.status === 'encours').length;
  const avancement = totalTaches === 0 ? 0 : Math.round((tachesTerminees / totalTaches) * 100);

  const prixTicket = Number(state.simulator.ticketPrice) || 0;
  const nbParticipants = Number(state.simulator.participants) || 0;
  const recettesSimulees = prixTicket * nbParticipants;
  const recettesSaisiesTotal = recettesProratees.total;
  const recettesTotal = recettesSimulees + recettesSaisiesTotal;
  const resultatSimule = recettesTotal - totalDepensesReelles;
  // Le seuil tient compte des recettes déjà saisies (section Recettes) : il ne reste
  // à couvrir par la billetterie que ce que ces recettes ne couvrent pas déjà.
  const montantResteACouvrir = Math.max(0, totalDepensesReelles - recettesSaisiesTotal);
  const seuilRentabiliteParticipants = prixTicket > 0 ? Math.ceil(montantResteACouvrir / prixTicket) : null;

  return {
    depensesProrateesTotal: depensesProratees.total,
    recettesProrateesTotal: recettesProratees.total,
    coutPreparationSalarie: mainOeuvre.coutPreparationSalarie,
    coutExecutionSalarie: mainOeuvre.coutExecutionSalarie,
    coutTotalSalarie: mainOeuvre.coutTotalSalarie,
    coutPreparationBenevole: mainOeuvre.coutPreparationBenevole,
    coutExecutionBenevole: mainOeuvre.coutExecutionBenevole,
    coutTotalBenevole: mainOeuvre.coutTotalBenevole,
    nbJoursExecution: calculerNbJoursExecution(),
    heuresExecutionTotal: calculerHeuresExecutionTotal(),
    totalDepensesReelles, totalValorise,
    totalTaches, tachesTerminees, tachesEnCours, avancement,
    prixTicket, nbParticipants, recettesSimulees, recettesSaisiesTotal, recettesTotal, resultatSimule,
    seuilRentabiliteParticipants
  };
}

/* --- Rentabilité par libellé : répartit dépenses/recettes globales au prorata des heures
   de chaque libellé, et attribue la main d'œuvre d'exécution directement (elle est déjà
   liée à une session, donc à un libellé précis). --- */
function calculerRepartitionParLibelle(m){
  const totauxHeures = calculerTotauxParLibelle();
  const heuresTotal = m.heuresExecutionTotal;

  // Dépenses générales (tout SAUF la charge variable par participant) : ce sont
  // celles qu'on répartit au prorata des heures, comme avant.
  const depensesGenerales = state.expenses.filter(d => d.mode !== 'par_participant');
  const depensesGeneralesTotal = depensesGenerales.reduce((s, d) => s + calculerMontantAttribueDepense(d), 0);
  const depensesVariables = state.expenses.filter(d => d.mode === 'par_participant');

  return totauxHeures.map(groupe => {
    const part = heuresTotal > 0 ? groupe.heures / heuresTotal : 0;
    const pricing = obtenirPricingLibelle(groupe.label);

    // Main d'œuvre d'exécution : attribution directe via la session (pas de prorata,
    // on sait déjà à quel libellé chaque heure appartient).
    let coutExecutionSalarieLabel = 0;
    state.labor.forEach(entree => {
      if(entree.phase !== 'execution') return;
      const session = trouverSession(entree.sessionId);
      if(!session) return;
      const labelSessionBrut = (session.label && session.label.trim()) ? session.label.trim() : '';
      const cleSession = labelSessionBrut ? normaliserLibelle(labelSessionBrut) : '__sans_libelle__';
      if(cleSession !== groupe.key) return;
      const membre = trouverMembre(entree.memberId);
      if(!membre || membre.type !== 'salarie') return;
      coutExecutionSalarieLabel += (Number(entree.heures) || 0) * (Number(membre.hourlyRate) || 0);
    });

    // Charges variables par participant rattachées à CE libellé : additionnées telles
    // quelles (coût par participant), pour la formule du seuil, PUIS multipliées par le
    // nombre de participants du libellé pour entrer dans le total des dépenses.
    const chargeVariableUnitaireLabel = depensesVariables
      .filter(d => (d.relatedLabel || '').trim() === groupe.label)
      .reduce((s, d) => s + (Number(d.amount) || 0), 0);
    const coutVariableTotalLabel = chargeVariableUnitaireLabel * pricing.participants;

    // Dépenses générales + préparation : réparties au prorata des heures (charges fixes).
    const depensesGeneralesLabel = depensesGeneralesTotal * part;
    const coutPreparationSalarieLabel = m.coutPreparationSalarie * part;
    const chargesFixesLabel = depensesGeneralesLabel + coutPreparationSalarieLabel + coutExecutionSalarieLabel;

    const totalDepensesReellesLabel = chargesFixesLabel + coutVariableTotalLabel;

    // Recettes : UNIQUEMENT la tarification propre à ce libellé (forfait, ou prix ×
    // participants). Le pool général (curseur global + section Recettes non rattachée)
    // n'entre plus dans le résultat par libellé, pour que 0 participant/0 prix donne
    // bien 0 € de recette ici — cette part générale reste comptée dans les totaux globaux.
    const recettesLabel = calculerRecettePropreLibelle(groupe.label);

    const resultatLabel = recettesLabel - totalDepensesReellesLabel;

    // Seuil de rentabilité par libellé — sécurisé contre les divisions par zéro/négatives :
    // - forfait et à l'unité utilisent maintenant la même logique : chacun a un "prix par
    //   participant" (forfaitAmount ou unitPrice) qui, multiplié par le nombre de
    //   participants, donne la recette. La marge par participant doit être positive.
    // - si le prix par participant ne couvre même pas la charge variable par participant,
    //   aucun nombre de participants ne suffira à équilibrer (seuil non atteignable).
    // - si les charges fixes sont déjà couvertes (≤ 0), le seuil est 0 (jamais négatif).
    const prixParParticipant = pricing.mode === 'forfait' ? pricing.forfaitAmount : pricing.unitPrice;
    const margeUnitaire = prixParParticipant - chargeVariableUnitaireLabel;
    let seuilLabel = null;
    let seuilLabelStatut; // 'ok' | 'non_atteignable'
    if(margeUnitaire > 0){
      seuilLabel = chargesFixesLabel <= 0 ? 0 : Math.ceil(chargesFixesLabel / margeUnitaire);
      seuilLabelStatut = 'ok';
    }else{
      seuilLabelStatut = 'non_atteignable';
    }

    return {
      label: groupe.label,
      heures: groupe.heures,
      chargesFixesLabel,
      chargeVariableUnitaireLabel,
      coutVariableTotalLabel,
      totalDepensesReellesLabel,
      recettesLabel,
      resultatLabel,
      pricing,
      seuilLabel,
      seuilLabelStatut
    };
  });
}

/* --- Rentabilité par élève (cours individuels) : même principe que par libellé, mais
   sans notion de charge variable par participant (non applicable ici). --- */
function calculerRepartitionParLibelleEtEleve(m){
  const groupesLibelle = calculerTotauxParLibelleEtEleve();
  const heuresTotal = m.heuresExecutionTotal;

  const depensesGeneralesTotal = state.expenses
    .filter(d => d.mode !== 'par_participant')
    .reduce((s, d) => s + calculerMontantAttribueDepense(d), 0);

  return groupesLibelle.map(groupeLibelle => {
    const elevesCalcules = groupeLibelle.eleves.map(groupeEleve => {
      const part = heuresTotal > 0 ? groupeEleve.heures / heuresTotal : 0;
      const pricing = obtenirPricingEleve(groupeLibelle.label, groupeEleve.label);

      // Main d'œuvre d'exécution : attribution directe via la session (ce libellé ET cet élève).
      let coutExecutionSalarieEleve = 0;
      state.labor.forEach(entree => {
        if(entree.phase !== 'execution') return;
        const session = trouverSession(entree.sessionId);
        if(!session) return;
        const texteLibelleSession = (session.label && session.label.trim()) ? session.label.trim() : '';
        const cleLibelleSession = texteLibelleSession ? normaliserLibelle(texteLibelleSession) : '__sans_libelle__';
        if(cleLibelleSession !== groupeLibelle.key) return;
        const elevesSession = obtenirElevesSession(session);
        if(!elevesSession.some(nom => normaliserLibelle(nom) === groupeEleve.key)) return;
        const membre = trouverMembre(entree.memberId);
        if(!membre || membre.type !== 'salarie') return;
        coutExecutionSalarieEleve += (Number(entree.heures) || 0) * (Number(membre.hourlyRate) || 0);
      });

      const depensesGeneralesEleve = depensesGeneralesTotal * part;
      const coutPreparationSalarieEleve = m.coutPreparationSalarie * part;
      const chargesFixesEleve = depensesGeneralesEleve + coutPreparationSalarieEleve + coutExecutionSalarieEleve;

      const recettesEleve = calculerRecettePropreEleve(groupeLibelle.label, groupeEleve.label);
      const resultatEleve = recettesEleve - chargesFixesEleve;

      const prixParParticipant = pricing.mode === 'forfait' ? pricing.forfaitAmount : pricing.unitPrice;
      let seuilEleve = null;
      let seuilEleveStatut;
      if(prixParParticipant > 0){
        seuilEleve = chargesFixesEleve <= 0 ? 0 : Math.ceil(chargesFixesEleve / prixParParticipant);
        seuilEleveStatut = 'ok';
      }else{
        seuilEleveStatut = 'non_atteignable';
      }

      return {
        label: groupeEleve.label,
        heures: groupeEleve.heures,
        chargesFixesEleve,
        totalDepensesReellesEleve: chargesFixesEleve,
        recettesEleve,
        resultatEleve,
        pricing,
        seuilEleve,
        seuilEleveStatut
      };
    });

    return { key: groupeLibelle.key, label: groupeLibelle.label, eleves: elevesCalcules };
  });
}

function dessinerGraphiqueRentabilite(m){
  const ctx = document.getElementById('profit-chart');
  if(!ctx) return;
  const prix = m.prixTicket || 0;
  const maxParticipants = Math.max((m.seuilRentabiliteParticipants || 10) * 2, m.nbParticipants * 2, 20);
  const pas = Math.max(1, Math.round(maxParticipants / 10));
  const labels = [];
  const recettesData = [];
  const coutsData = [];
  for(let p = 0; p <= maxParticipants; p += pas){
    labels.push(p);
    recettesData.push(p * prix + m.recettesSaisiesTotal);
    coutsData.push(m.totalDepensesReelles);
  }
  if(profitChartInstance) profitChartInstance.destroy();
  profitChartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Recettes', data: recettesData, borderColor: '#0F5257', backgroundColor: 'rgba(15,82,87,0.08)', fill: true, tension: 0.15, pointRadius: 0, borderWidth: 2.5 },
        { label: 'Coûts totaux', data: coutsData, borderColor: '#E03131', backgroundColor: 'rgba(224,49,49,0.04)', fill: true, tension: 0, pointRadius: 0, borderWidth: 2.5, borderDash: [6,4] }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { position: 'bottom', labels: { boxWidth: 12, font: { family: 'Inter', size: 11.5 } } },
        tooltip: { callbacks: { label: (c) => c.dataset.label + ' : ' + formaterMontant(c.parsed.y) } }
      },
      scales: {
        x: { title: { display: true, text: 'Nombre de participants', font: { family:'Inter', size: 11 } }, grid: { display: false } },
        y: { title: { display: true, text: 'Montant (€)', font: { family:'Inter', size: 11 } }, grid: { color: '#EEF1EF' } }
      }
    }
  });
}

function genererTachesDepuisObjectifs(){
  const texte = state.project.objectives || '';
  const items = texte.split(/,|\s[-–—]\s/).map(s => s.trim()).filter(s => s.length > 0);
  if(items.length === 0) return 0;

  const labelsExistants = new Set(state.tasks.map(t => (t.label || '').trim().toLowerCase()));
  let nbAjoutees = 0;
  items.forEach(item => {
    const cle = item.toLowerCase();
    if(labelsExistants.has(cle)) return;
    state.tasks.push({ id: genererId(), label: item, assigneeId: '', estimatedHours: 0, deadline: '', status: 'afaire' });
    labelsExistants.add(cle);
    nbAjoutees++;
  });
  return nbAjoutees;
}

function enregistrerFicheProjet(){
  // On garde une copie de l'état précédent pour savoir exactement ce qui change
  const ancien = {
    name: state.project.name,
    status: state.project.status,
    startDate: state.project.startDate,
    endDate: state.project.endDate,
    description: state.project.description,
    objectives: state.project.objectives
  };

  state.project.name = document.getElementById('cfg-name').value.trim() || 'Mon projet ASBL';
  state.project.status = document.getElementById('cfg-status').value;
  state.project.startDate = document.getElementById('cfg-start').value;
  state.project.endDate = document.getElementById('cfg-end').value;
  state.project.description = document.getElementById('cfg-desc').value;
  state.project.objectives = document.getElementById('cfg-objectifs').value;

  const champsModifies = [];
  if(ancien.name !== state.project.name) champsModifies.push('le nom (« ' + state.project.name + ' »)');
  if(ancien.status !== state.project.status) champsModifies.push('le statut (' + state.project.status + ')');
  if(ancien.startDate !== state.project.startDate) champsModifies.push('la date de début');
  if(ancien.endDate !== state.project.endDate) champsModifies.push('la date de fin');
  if(ancien.description !== state.project.description) champsModifies.push('la description');
  if(ancien.objectives !== state.project.objectives) champsModifies.push('les objectifs');

  const nbTachesAjoutees = genererTachesDepuisObjectifs();
  const descriptionAction = champsModifies.length > 0
    ? 'a modifié ' + champsModifies.join(', ')
    : 'a enregistré la fiche projet (aucun changement)';
  enregistrerAction(descriptionAction);
  mettreAJourStatutFichier();
  rendreTaches();
  rendreAccueil();
  if(nbTachesAjoutees > 0){
    afficherToast('Fiche enregistrée — ' + nbTachesAjoutees + ' tâche(s) créée(s) depuis les objectifs.', 'succes');
  }else{
    afficherToast('Fiche projet enregistrée.', 'succes');
  }
}

        <h3 class="font-display" style="font-size:16px; font-weight:700; margin:0 0 16px 0;">${membre ? 'Modifier le membre' : "Ajouter un membre de l'équipe"}</h3>
        <div style="display:flex; flex-direction:column; gap:12px;">
          <div>
            <label class="field-label">Nom</label>
            <input type="text" class="input-field" id="membre-nom" placeholder="Ex. Sophie Dubois" value="${membre ? echapperHtml(membre.name) : ''}">
          </div>
          <div>
            <label class="field-label">Poste (libre)</label>
            <input type="text" class="input-field" id="membre-poste" placeholder="Ex. Bar, Accueil, Sonorisation..." value="${membre ? echapperHtml(membre.role || '') : ''}">
          </div>
          <div>
            <label class="field-label">Statut</label>
            <select class="input-field" id="membre-type" onchange="mettreAJourLabelTauxMembre()">
              <option value="benevole" ${membre && membre.type === 'benevole' ? 'selected' : ''}>Bénévole</option>

          <div>
            <label class="field-label" id="membre-taux-label">Valorisation horaire (€/h)</label>
            <input type="number" class="input-field" id="membre-taux" min="0" step="0.5" placeholder="0.00" value="${membre ? membre.hourlyRate : ''}">

          <button class="btn-primary" onclick="enregistrerMembre()"><i data-lucide="check" style="width:15px;height:15px;"></i> ${membre ? 'Enregistrer les modifications' : 'Ajouter'}</button>

  `;

}

function mettreAJourLabelTauxMembre(){
  const type = document.getElementById('membre-type').value;
  document.getElementById('membre-taux-label').textContent = type === 'salarie' ? 'Coût horaire (€/h)' : 'Valorisation horaire (€/h)';
}

function enregistrerMembre(){
  const nom = document.getElementById('membre-nom').value.trim();
  const poste = document.getElementById('membre-poste').value.trim();
  const type = document.getElementById('membre-type').value;
  const taux = parseFloat(document.getElementById('membre-taux').value) || 0;
  if(!nom){ afficherToast('Indique un nom pour ce membre.', 'erreur'); return; }

  if(editingMemberId){
    const membre = trouverMembre(editingMemberId);
    if(membre){
      membre.name = nom; membre.role = poste; membre.type = type; membre.hourlyRate = taux;
    }
    afficherToast('Membre modifié.', 'succes');
    editingMemberId = null;
    enregistrerAction('a modifié la fiche de ' + nom);
  }else{
    state.team.push({ id: genererId(), name: nom, role: poste, type, hourlyRate: taux });
    afficherToast('Membre ajouté à l\'équipe.', 'succes');
    editingMemberId = null;
    enregistrerAction('a ajouté ' + nom + ' à l\'équipe');
  }

  fermerModal();
  rendreConfig();
  rendreTaches();
  rendreBudget();
}

function supprimerMembre(id){
  const utilise = state.tasks.some(t => t.assigneeId === id);
  if(utilise){
    afficherToast('Ce membre est assigné à des tâches. Réassigne-les avant de le supprimer.', 'erreur');
    return;
  }
  const membre = trouverMembre(id);
  const nomMembre = membre ? membre.name : 'un membre';
  state.team = state.team.filter(m => m.id !== id);
  enregistrerAction('a retiré ' + nomMembre + ' de l\'équipe');
  rendreConfig();
  afficherToast('Membre supprimé.', 'info');
}

function fermerModal(){
  document.getElementById('modal-root').innerHTML = '';
}

/* =========================================================================

   ========================================================================= */

          </button>

    <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:18px;">

      <button class="btn-primary" onclick="ouvrirModalTache()" ${state.team.length === 0 ? 'disabled title="Ajoute d\'abord un membre d\'équipe"' : ''}>
        <i data-lucide="plus" style="width:15px;height:15px;"></i> Ajouter une tâche
      </button>
    </div>

    <div class="card" style="padding:18px 22px; margin-bottom:18px;">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
        <span style="font-size:12.5px; font-weight:600; color:var(--ink-soft);">Progression générale</span>
        <span class="font-mono-num" style="font-size:13px; font-weight:700;">${m.avancement}%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${m.avancement}%;"></div></div>
      <div style="display:flex; gap:16px; margin-top:10px; font-size:12px; color:var(--ink-soft); flex-wrap:wrap;">
        <span>${m.totalTaches} tâche(s) au total</span>
        <span>${m.tachesEnCours} en cours</span>
        <span>${m.tachesTerminees} terminée(s)</span>
      </div>
    </div>

    <div class="card" style="padding:20px;">
      <div style="display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;">
        ${['toutes','afaire','encours','termine'].map(s => `
          <button class="btn-secondary" style="${filtreStatutTache === s ? 'background:var(--primary); color:white; border-color:var(--primary);' : ''} padding:7px 14px; font-size:13px;" onclick="filtrerTaches('${s}')">
            ${s === 'toutes' ? 'Toutes' : libelleStatutTache(s)}
          </button>
        `).join('')}
      </div>
      ${tachesFiltrees.length === 0 ? `
        <div style="text-align:center; padding:40px 10px; color:var(--ink-soft);">
          <i data-lucide="list-checks" style="width:34px;height:34px; margin-bottom:10px; opacity:.5;"></i>
          <p style="font-size:13.5px; margin:0;">${state.tasks.length === 0 ? "Aucune tâche pour l'instant. Crée ta première tâche pour suivre l'avancement du projet." : "Aucune tâche ne correspond à ce filtre."}</p>

          <table class="data-table">

function filtrerTaches(statut){
  filtreStatutTache = statut;

}
