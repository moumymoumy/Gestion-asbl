}

function enregistrerTache(){
  const label = document.getElementById('tache-label').value.trim();
  const assigneeId = document.getElementById('tache-assignee').value;
  const heures = parseFloat(document.getElementById('tache-heures').value) || 0;
  const deadline = document.getElementById('tache-deadline').value;
  const statut = document.getElementById('tache-statut').value;
  if(!label){ afficherToast('Indique un libellé pour cette tâche.', 'erreur'); return; }

  if(editingTaskId){
    const tache = state.tasks.find(t => t.id === editingTaskId);
    if(tache){
      tache.label = label; tache.assigneeId = assigneeId; tache.estimatedHours = heures; tache.deadline = deadline; tache.status = statut;
    }
    afficherToast('Tâche modifiée.', 'succes');
    editingTaskId = null;
    enregistrerAction('a modifié la tâche « ' + label + ' »');
  }else{
    state.tasks.push({ id: genererId(), label, assigneeId, estimatedHours: heures, deadline, status: statut });
    afficherToast('Tâche ajoutée.', 'succes');
    editingTaskId = null;
    enregistrerAction('a ajouté la tâche « ' + label + ' »');
  }
  fermerModal();
  rendreTaches();
  rendreAccueil();
  rendreBudget();
}

function changerStatutTache(id, nouveauStatut){
  const tache = state.tasks.find(t => t.id === id);
  if(!tache) return;
  tache.status = nouveauStatut;
  enregistrerAction('a changé le statut de « ' + tache.label + ' » en ' + nouveauStatut);
  rendreTaches();
  rendreAccueil();
  afficherToast('Statut mis à jour.', 'info');
}

function supprimerTache(id){
  const tache = state.tasks.find(t => t.id === id);
  const libelle = tache ? tache.label : 'une tâche';
  state.tasks = state.tasks.filter(t => t.id !== id);
  enregistrerAction('a supprimé la tâche « ' + libelle + ' »');
  rendreTaches();
  rendreAccueil();
  rendreBudget();
  afficherToast('Tâche supprimée.', 'info');
}

/* =========================================================================
   11. RENDU — MODULE BUDGET & SIMULATEUR
   ========================================================================= */
function rendreBudget(){
  const conteneur = document.getElementById('view-budget');
  const m = calculerMetriques();

  /* --- Sessions d'exécution --- */
  /* --- Sessions groupées par libellé, sous forme de dossiers repliables (accordéon) --- */
  function ligneSessionHtml(s){
    return `
    <tr>
      <td style="font-weight:600;">${formaterDate(s.date)}</td>
      <td>${s.label ? echapperHtml(s.label) : '<span style="color:var(--ink-soft);">—</span>'}</td>
      <td>
        <input type="text" class="input-field champ-eleve-inline" data-session-id="${s.id}" list="liste-eleves-existants" placeholder="Élève(s)..." value="${echapperHtml(obtenirElevesSession(s).join(', '))}" style="min-width:130px; font-size:13px; padding:6px 10px;">
      </td>
      <td class="font-mono-num">${s.startTime && s.endTime ? `${s.startTime}–${s.endTime} <span style="color:var(--ink-soft);">(${Number(s.hours) || 0} h)</span>` : `${Number(s.hours) || 0} h`}</td>
      <td>
        <select class="input-field champ-paiement-inline" data-session-id="${s.id}" style="min-width:80px; font-size:13px; padding:6px 10px;">
          <option value="non" ${!s.paid ? 'selected' : ''}>Non</option>
          <option value="oui" ${s.paid ? 'selected' : ''}>Oui</option>
        </select>
      </td>
      <td style="text-align:right; white-space:nowrap;">
        <button class="btn-edit-ghost" onclick="ouvrirModalSession('${s.id}')" title="Modifier">
          <i data-lucide="pencil" style="width:16px;height:16px;"></i>
        </button>
        <button class="btn-edit-ghost" onclick="ouvrirModalDupliquerSession('${s.id}')" title="Dupliquer en créneaux successifs">
          <i data-lucide="copy-plus" style="width:16px;height:16px;"></i>
        </button>
        <button class="btn-danger-ghost" onclick="supprimerSession('${s.id}')" title="Supprimer">
          <i data-lucide="trash-2" style="width:16px;height:16px;"></i>
        </button>
      </td>
    </tr>
  `;
  }

  const groupesSessions = {};
  state.executionSessions.forEach(s => {
    const texteBrut = (s.label && s.label.trim()) ? s.label.trim() : '';
    const cle = texteBrut ? normaliserLibelle(texteBrut) : '__sans_libelle__';
    if(!groupesSessions[cle]) groupesSessions[cle] = { key: cle, label: cle === '__sans_libelle__' ? 'Sans libellé' : texteBrut, sessions: [] };
    groupesSessions[cle].sessions.push(s);
  });
  const groupesSessionsListe = Object.values(groupesSessions).sort((a,b) => a.label.localeCompare(b.label));
  groupesSessionsListe.forEach(g => g.sessions.sort((a,b) => (a.date || '').localeCompare(b.date || '')));

  /* --- Détecte les lots de créneaux générés ensemble (batchId partagé) dans un groupe --- */
  function obtenirLotsDansGroupe(sessions){
    const lots = {};
    sessions.forEach(s => {
      if(!s.batchId) return;
      if(!lots[s.batchId]) lots[s.batchId] = [];
      lots[s.batchId].push(s);
    });
    return Object.entries(lots).map(([batchId, list]) => {
      const dates = [...new Set(list.map(s => s.date))].sort();
      const premiereDateSessions = list.filter(s => s.date === dates[0]).sort((a,b) => (a.startTime || '').localeCompare(b.startTime || ''));
      const nbCreneauxParDate = premiereDateSessions.length;
      const heureDebut = premiereDateSessions[0] ? (premiereDateSessions[0].startTime || '') : '';
      const heureFin = premiereDateSessions[nbCreneauxParDate - 1] ? (premiereDateSessions[nbCreneauxParDate - 1].endTime || '') : '';
      const dureeCreneau = premiereDateSessions[0] ? (Number(premiereDateSessions[0].hours) || 0) : 0;
      return { batchId, dates, nbCreneauxParDate, heureDebut, heureFin, dureeCreneau };
    });
  }

  const lignesSessions = groupesSessionsListe.map(g => {
    const estOuvert = !libellesSessionsReplies.has(g.key);
    const totalHeuresGroupe = g.sessions.reduce((s, x) => s + (Number(x.hours) || 0), 0);
    const lots = estOuvert ? obtenirLotsDansGroupe(g.sessions) : [];
    const lignesLots = lots.map(lot => `
      <tr>
        <td colspan="6" style="padding:6px 16px 10px 34px; background:var(--surface-2);">
          <span style="font-size:11.5px; color:var(--ink-soft);">Lot généré : ${lot.dates.length} date(s), ${lot.nbCreneauxParDate} créneau(x)/date, ${lot.heureDebut}–${lot.heureFin}</span>
          <button class="btn-secondary" style="margin-left:10px; padding:4px 10px; font-size:11.5px;" onclick="ouvrirModalModifierLot('${lot.batchId}')">
            <i data-lucide="clock" style="width:13px;height:13px;"></i> Modifier la plage horaire
          </button>
        </td>
      </tr>
    `).join('');

    /* --- Sous-dossiers par date, repliés par défaut, à l'intérieur du libellé --- */
    let lignesDates = '';
    if(estOuvert){
      const groupesDates = {};
      g.sessions.forEach(s => {
        if(!groupesDates[s.date]) groupesDates[s.date] = [];
        groupesDates[s.date].push(s);
      });
      const datesTriees = Object.keys(groupesDates).sort();
      lignesDates = datesTriees.map(date => {
        const cleDate = g.key + '||' + date;
        const sessionsDate = groupesDates[date];
        const dateOuverte = datesSessionsOuvertes.has(cleDate);
        const totalHeuresDate = sessionsDate.reduce((s, x) => s + (Number(x.hours) || 0), 0);
        return `
          <tr class="ligne-groupe-date" data-groupe-date-key="${echapperHtml(cleDate)}" style="cursor:pointer;">
            <td colspan="6" style="font-weight:600; padding:8px 16px 8px 34px;">
              <i data-lucide="${dateOuverte ? 'chevron-down' : 'chevron-right'}" style="width:13px;height:13px; vertical-align:-3px; margin-right:8px; color:var(--ink-soft);"></i>
              ${formaterDate(date)}
              <span style="font-weight:400; color:var(--ink-soft); font-size:12px; margin-left:6px;">(${sessionsDate.length} créneau${sessionsDate.length > 1 ? 'x' : ''}, ${totalHeuresDate} h)</span>
            </td>
          </tr>
          ${dateOuverte ? sessionsDate.map(s => ligneSessionHtml(s)).join('') : ''}
        `;
      }).join('');
    }

    return `
      <tr class="ligne-groupe-session" data-groupe-key="${echapperHtml(g.key)}" style="cursor:pointer; background:var(--surface-2);">
        <td colspan="6" style="font-weight:700; padding:10px 16px;">
          <i data-lucide="${estOuvert ? 'chevron-down' : 'chevron-right'}" style="width:14px;height:14px; vertical-align:-3px; margin-right:8px; color:var(--ink-soft);"></i>
          ${echapperHtml(g.label)}
          <span style="font-weight:400; color:var(--ink-soft); font-size:12px; margin-left:6px;">(${g.sessions.length} session${g.sessions.length > 1 ? 's' : ''}, ${totalHeuresGroupe} h)</span>
        </td>
      </tr>
      ${estOuvert ? lignesLots + lignesDates : ''}
    `;
  }).join('');

  /* --- Totaux d'heures par libellé --- */
  const totauxLibelles = calculerTotauxParLibelle();
  const lignesTotauxLibelles = totauxLibelles.map(g => `
    <tr>
      <td style="font-weight:600;">${echapperHtml(g.label)}</td>
      <td class="font-mono-num" style="font-weight:700;">${g.heures} h</td>
    </tr>
  `).join('');

  /* --- Totaux d'heures par élève --- */
  const totauxEleves = calculerTotauxParEleve();
  const lignesTotauxEleves = totauxEleves.map(g => `
    <tr>
      <td style="font-weight:600;">${echapperHtml(g.label)}</td>
      <td class="font-mono-num" style="font-weight:700;">${g.heures} h</td>
    </tr>
  `).join('');

  /* --- Dépenses proratées --- */
  const depensesCalculees = calculerDepensesProratees().lignes;
  const lignesDepenses = depensesCalculees.map(d => `
    <tr>
      <td style="font-weight:600; max-width:180px;">${echapperHtml(d.label)}</td>
      <td>
        <span class="badge" style="background:var(--primary-soft); color:var(--primary-dark);">${libelleModeDepense(d.mode)}</span>
        ${d.mode === 'par_participant' && d.relatedLabel ? `<div style="font-size:11px; color:var(--ink-soft); margin-top:4px;">→ ${echapperHtml(d.relatedLabel)}</div>` : ''}
      </td>
      <td class="font-mono-num">${d.mode === 'par_participant' ? formaterMontant(d.amount) + ' / participant' : formaterMontant(d.amount)}</td>
      <td class="font-mono-num" style="font-weight:700;">${formaterMontant(d.montantAttribue)}</td>
      <td style="text-align:right; white-space:nowrap;">
        <button class="btn-edit-ghost" onclick="ouvrirModalDepense('${d.id}')" title="Modifier">
          <i data-lucide="pencil" style="width:16px;height:16px;"></i>
        </button>
        <button class="btn-danger-ghost" onclick="supprimerDepense('${d.id}')" title="Supprimer">
          <i data-lucide="trash-2" style="width:16px;height:16px;"></i>
        </button>

/* --- Replie/déplie un dossier de libellé dans le tableau des sessions --- */
function attacherEcouteursGroupesSessions(){
  document.querySelectorAll('.ligne-groupe-session').forEach(ligne => {
    ligne.addEventListener('click', () => {
      const cle = ligne.dataset.groupeKey;
      if(libellesSessionsReplies.has(cle)) libellesSessionsReplies.delete(cle);
      else libellesSessionsReplies.add(cle);
      rendreBudget();
    });
  });
  document.querySelectorAll('.ligne-groupe-date').forEach(ligne => {
    ligne.addEventListener('click', (e) => {
      e.stopPropagation(); // évite de re-basculer le dossier de libellé parent
      const cle = ligne.dataset.groupeDateKey;
      if(datesSessionsOuvertes.has(cle)) datesSessionsOuvertes.delete(cle);
      else datesSessionsOuvertes.add(cle);
      rendreBudget();
    });
  });
}

/* --- Édition en ligne du champ Élève directement dans le tableau des sessions,
   sans ouvrir de modale (pratique après une génération de créneaux en lot). --- */
function attacherEcouteursEleveInline(){
  document.querySelectorAll('.champ-eleve-inline').forEach(input => {
    input.addEventListener('change', () => {
      const session = trouverSession(input.dataset.sessionId);
      if(!session) return;
      session.students = input.value.split(',').map(n => n.trim()).filter(Boolean);
      delete session.student;
      planifierSauvegarde();
      // Rafraîchir seulement les totaux/rentabilité par élève, sans reconstruire tout
      // le tableau (on perdrait le focus si l'utilisateur enchaîne les champs).
      const m = calculerMetriques();
      const conteneurEleves = document.getElementById('sim-repartition-eleves');
      if(conteneurEleves){
        conteneurEleves.innerHTML = rendreRepartitionElevesSimulateur(m);
        attacherEcouteursPricingEleves();
        attacherEcouteursGroupesEleves();
      }
      enregistrerAction('a renseigné un élève sur une session (' + formaterDate(session.date) + ')');
    });
  });
  document.querySelectorAll('.champ-paiement-inline').forEach(select => {
    select.addEventListener('change', () => {
      const session = trouverSession(select.dataset.sessionId);
      if(!session) return;
      session.paid = select.value === 'oui';
      planifierSauvegarde();
      enregistrerAction('a marqué le paiement d\'une session comme ' + (session.paid ? 'reçu' : 'non reçu') + ' (' + formaterDate(session.date) + ')');
    });
  });
}

/* --- Détail de rentabilité par libellé (Orchestre, Chœur, Solistes...) : chaque ligne

function rendreRepartitionLabelsSimulateur(m){
  const repartition = calculerRepartitionParLibelle(m);
  if(repartition.length < 2) return ''; // pas utile s'il n'y a qu'un seul libellé (ou aucun)

  const cartes = repartition.map(r => {
    const estViableLabel = r.resultatLabel >= 0;
    let seuilTexte;
    if(r.seuilLabelStatut === 'non_atteignable') seuilTexte = 'Non atteignable';
    else seuilTexte = r.seuilLabel + ' participant(s)';

    return `
      <div class="card" style="padding:16px; margin-bottom:12px;">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:12px;">

/* --- Rentabilité par élève : même présentation que par libellé, adaptée au vocabulaire
   des cours individuels (élève au lieu de participants). --- */
function rendreRepartitionElevesSimulateur(m){
  const groupesLibelle = calculerRepartitionParLibelleEtEleve(m);

  const blocsLibelle = groupesLibelle.map(groupeLibelle => {
    const estOuvert = !libellesElevesReplies.has(groupeLibelle.key);

    const cartes = groupeLibelle.eleves.map(r => {
      const estViableEleve = r.resultatEleve >= 0;

      return `

          <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:12px;">

            <div style="display:flex; gap:6px;">
              <button type="button" class="btn-secondary btn-pricing-mode-eleve" data-libelle="${echapperHtml(groupeLibelle.label)}" data-eleve="${echapperHtml(r.label)}" data-mode="unite" style="padding:6px 12px; font-size:12px; ${r.pricing.mode === 'unite' ? 'background:var(--primary-soft); color:var(--primary-dark); border-color:var(--primary-soft);' : ''}">À l'unité</button>

            </div>
          </div>
          <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(140px,1fr)); gap:10px; margin-bottom:14px;">
            <div>
              <label class="field-label">Nombre de personnes (ce cours)</label>
              <input type="number" class="input-field eleve-pricing-input" data-libelle="${echapperHtml(groupeLibelle.label)}" data-eleve="${echapperHtml(r.label)}" data-champ="participants" min="0" step="1" value="${r.pricing.participants}">
            </div>
            ${r.pricing.mode === 'forfait' ? `
              <div>
                <label class="field-label">Montant forfaitaire (€, pour tout le suivi)</label>
                <input type="number" class="input-field eleve-pricing-input" data-libelle="${echapperHtml(groupeLibelle.label)}" data-eleve="${echapperHtml(r.label)}" data-champ="forfaitAmount" min="0" step="1" value="${r.pricing.forfaitAmount}">
              </div>
            ` : `
              <div>
                <label class="field-label">Prix unitaire (€ / séance)</label>
                <input type="number" class="input-field eleve-pricing-input" data-libelle="${echapperHtml(groupeLibelle.label)}" data-eleve="${echapperHtml(r.label)}" data-champ="unitPrice" min="0" step="0.5" value="${r.pricing.unitPrice}">
              </div>
            `}
          </div>
          <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(120px,1fr)); gap:12px; font-size:12.5px; padding-top:12px; border-top:1px solid var(--border);">
            <div><div style="color:var(--ink-soft); margin-bottom:3px;">Dépenses</div><div class="font-mono-num" style="font-weight:700;">${formaterMontant(r.totalDepensesReellesEleve)}</div></div>
            <div><div style="color:var(--ink-soft); margin-bottom:3px;">Recettes</div><div class="font-mono-num" style="font-weight:700;">${formaterMontant(r.recettesEleve)}</div></div>
            <div><div style="color:var(--ink-soft); margin-bottom:3px;">Résultat</div><div class="font-mono-num" style="font-weight:700; color:${estViableEleve ? 'var(--success)' : 'var(--danger)'};">${estViableEleve ? '+' : ''}${formaterMontant(r.resultatEleve)}</div></div>
            <div><div style="color:var(--ink-soft); margin-bottom:3px;">Seuil de rentabilité</div><div class="font-mono-num" style="font-weight:700;">${seuilTexte}</div></div>
          </div>
        </div>
      `;
    }).join('');

    return `
      <div class="ligne-groupe-eleve-libelle" data-groupe-eleve-libelle-key="${echapperHtml(groupeLibelle.key)}" style="cursor:pointer; display:flex; align-items:center; gap:8px; padding:10px 6px; margin-bottom:6px; background:var(--surface-2); border-radius:8px;">

/* --- Bascule entre saisie manuelle des heures et saisie d'une plage horaire --- */
function basculerModeDureeSession(mode){
  const blocManuel = document.getElementById('bloc-duree-manuelle');
  const blocPlage = document.getElementById('bloc-duree-plage');
  const btnManuel = document.getElementById('btn-mode-manuel');
  const btnPlage = document.getElementById('btn-mode-plage');
  if(!blocManuel || !blocPlage) return;
  blocManuel.style.display = mode === 'manual' ? 'block' : 'none';
  blocPlage.style.display = mode === 'range' ? 'block' : 'none';
  blocManuel.dataset.actif = mode === 'manual' ? '1' : '0';
  blocPlage.dataset.actif = mode === 'range' ? '1' : '0';
  btnManuel.style.background = mode === 'manual' ? 'var(--primary-soft)' : 'var(--surface)';
  btnManuel.style.color = mode === 'manual' ? 'var(--primary-dark)' : 'var(--ink)';
  btnPlage.style.background = mode === 'range' ? 'var(--primary-soft)' : 'var(--surface)';
  btnPlage.style.color = mode === 'range' ? 'var(--primary-dark)' : 'var(--ink)';
}

function mettreAJourDureeCalculee(){
  const elDebut = document.getElementById('session-heure-debut');
  const elFin = document.getElementById('session-heure-fin');
  const elAffichage = document.getElementById('session-duree-calculee');
  if(!elDebut || !elFin || !elAffichage) return;
  const duree = calculerDureeDepuisPlage(elDebut.value, elFin.value);
  elAffichage.textContent = duree + ' h';
}

function enregistrerSession(){
  const date = document.getElementById('session-date').value;
  const label = document.getElementById('session-label').value.trim();
  const students = document.getElementById('session-student').value.split(',').map(n => n.trim()).filter(Boolean);
  const paid = document.getElementById('session-paiement').value === 'oui';
  const modeManuelActif = document.getElementById('bloc-duree-manuelle').dataset.actif === '1';
  if(!date){ afficherToast('Indique la date de cette session.', 'erreur'); return; }

  let heures, startTime = null, endTime = null;
  if(modeManuelActif){
    heures = parseFloat(document.getElementById('session-heures').value) || 0;
  }else{
    startTime = document.getElementById('session-heure-debut').value || null;
    endTime = document.getElementById('session-heure-fin').value || null;
    if(!startTime || !endTime){ afficherToast('Indique une heure de début et de fin.', 'erreur'); return; }
    heures = calculerDureeDepuisPlage(startTime, endTime);
  }

  if(editingSessionId){
    const session = trouverSession(editingSessionId);
    if(session){ session.date = date; session.label = label; session.students = students; delete session.student; session.paid = paid; session.hours = heures; session.startTime = startTime; session.endTime = endTime; }
    afficherToast('Session modifiée.', 'succes');
    editingSessionId = null;
    enregistrerAction('a modifié une session d\'exécution (' + date + ')');
  }else{
    state.executionSessions.push({ id: genererId(), date, label, students, paid, hours: heures, startTime, endTime });
    afficherToast('Session ajoutée.', 'succes');
    editingSessionId = null;
    enregistrerAction('a ajouté une session d\'exécution (' + date + ')');
  }
  fermerModal();
  rendreBudget();
  rendreAccueil();
}

function supprimerSession(id){
  const utilisee = state.labor.some(e => e.sessionId === id);
  if(utilisee){
    afficherToast('Cette session est utilisée dans la main d\'œuvre. Supprime d\'abord ces entrées.', 'erreur');
    return;
  }
  state.executionSessions = state.executionSessions.filter(s => s.id !== id);
  enregistrerAction('a supprimé une session d\'exécution');
  rendreBudget();
  rendreAccueil();
  afficherToast('Session supprimée.', 'info');
}

/* --- Ajoute une durée (en heures) à une heure "HH:MM" et renvoie la nouvelle heure --- */
function ajouterHeuresAHeure(heureStr, dureeHeures){
  const [h, m] = heureStr.split(':').map(Number);
  let totalMinutes = h * 60 + m + Math.round(dureeHeures * 60);
  totalMinutes = ((totalMinutes % (24 * 60)) + 24 * 60) % (24 * 60); // sécurité passage minuit
  const hh = String(Math.floor(totalMinutes / 60)).padStart(2, '0');
  const mm = String(totalMinutes % 60).padStart(2, '0');
  return `${hh}:${mm}`;
}

function enregistrerDuplicationSession(){
  const session = trouverSession(sessionADupliquerId);
  if(!session){ fermerModal(); return; }
  const nombre = parseInt(document.getElementById('duplication-nombre').value, 10) || 0;
  if(nombre <= 0){ afficherToast('Indique au moins 1 créneau à créer.', 'erreur'); return; }

  const aUnePlage = !!(session.startTime && session.endTime);
  let curseurDebut = session.startTime;
  const duree = Number(session.hours) || 0;

  for(let i = 0; i < nombre; i++){
    if(aUnePlage){
      const nouveauDebut = ajouterHeuresAHeure(curseurDebut, duree);
      const nouvelleFin = ajouterHeuresAHeure(nouveauDebut, duree);
      state.executionSessions.push({
        id: genererId(), date: session.date, label: session.label, students: [],
        hours: duree, startTime: nouveauDebut, endTime: nouvelleFin
      });
      curseurDebut = nouveauDebut;
    }else{
      state.executionSessions.push({
        id: genererId(), date: session.date, label: session.label, students: [],
        hours: duree, startTime: null, endTime: null
      });
    }
  }
  enregistrerAction(`a dupliqué une session en ${nombre} créneau(x) supplémentaire(s) (` + formaterDate(session.date) + ')');

  rendreAccueil();

function enregistrerGenerationCreneaux(){
  const date = document.getElementById('generer-date').value;
  const label = document.getElementById('generer-label').value.trim();
  const debut = document.getElementById('generer-debut').value;
  const fin = document.getElementById('generer-fin').value;
  const duree = parseFloat(document.getElementById('generer-duree').value) || 0;

  if(!date){ afficherToast('Indique la date de la plage à découper.', 'erreur'); return; }
  if(!debut || !fin){ afficherToast('Indique une heure de début et de fin.', 'erreur'); return; }
  if(duree <= 0){ afficherToast('Indique une durée de créneau supérieure à 0.', 'erreur'); return; }

  const dureeTotale = calculerDureeDepuisPlage(debut, fin);
  if(dureeTotale <= 0){ afficherToast('La plage horaire est invalide.', 'erreur'); return; }

  const nombreCreneaux = Math.floor((dureeTotale / duree) + 1e-9); // tolérance flottant
  if(nombreCreneaux < 1){ afficherToast('La durée d\'un créneau est plus grande que la plage indiquée.', 'erreur'); return; }

  const batchId = genererId();
  let curseur = debut;
  for(let i = 0; i < nombreCreneaux; i++){
    const finCreneau = ajouterHeuresAHeure(curseur, duree);
    state.executionSessions.push({
      id: genererId(), date, label, students: [], batchId,
      hours: duree, startTime: curseur, endTime: finCreneau
    });
    curseur = finCreneau;
  }

  const resteNonCouvert = Math.round((dureeTotale - nombreCreneaux * duree) * 100) / 100;
  afficherToast(
    nombreCreneaux + ' créneau(x) créé(s)' + (resteNonCouvert > 0 ? ` (${resteNonCouvert} h non couvertes en fin de plage — ajoute un créneau manuel si besoin)` : '') + '.',
    'succes'
  );
  enregistrerAction(`a généré ${nombreCreneaux} créneaux (` + formaterDate(date) + ')');
  fermerModal();
  rendreBudget();
  rendreAccueil();
}

/* --- Convertit un texte de date libre (JJ/MM/AAAA, JJ-MM-AAAA ou AAAA-MM-JJ) en ISO --- */
function parserDateEnIso(texte){
  const t = texte.trim();
  if(!t) return null;
  if(/^\d{4}-\d{2}-\d{2}$/.test(t)) return t;
  const m = t.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{4})$/);
  if(m) return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  return null;
}

function ajouterDatesEnMasseMulti(){
  const texte = document.getElementById('multi-dates-texte').value;
  const morceaux = texte.split(/[,;\n]+/).map(s => s.trim()).filter(Boolean);
  let nbAjoutees = 0, nbInvalides = 0;
  morceaux.forEach(morceau => {
    const iso = parserDateEnIso(morceau);
    if(iso){
      if(!datesMultiSession.includes(iso)){ datesMultiSession.push(iso); nbAjoutees++; }
    }else{
      nbInvalides++;
    }
  });
  document.getElementById('multi-dates-texte').value = '';
  rendreListeDatesMulti();
  if(nbInvalides > 0) afficherToast(nbInvalides + ' date(s) non reconnue(s) ignorée(s) (formats acceptés : JJ/MM/AAAA ou AAAA-MM-JJ).', 'erreur');
  else if(nbAjoutees > 0) afficherToast(nbAjoutees + ' date(s) ajoutée(s).', 'succes');
}

function appliquerModificationLot(){
  const batchId = batchIdEnModification;
  const debut = document.getElementById('modif-lot-debut').value;
  const fin = document.getElementById('modif-lot-fin').value;
  const duree = parseFloat(document.getElementById('modif-lot-duree').value) || 0;

  if(!debut || !fin){ afficherToast('Indique une heure de début et de fin.', 'erreur'); return; }
  if(duree <= 0){ afficherToast('Indique une durée de créneau supérieure à 0.', 'erreur'); return; }
  const dureeTotale = calculerDureeDepuisPlage(debut, fin);
  if(dureeTotale <= 0){ afficherToast('La plage horaire est invalide.', 'erreur'); return; }
  const nouveauNombreCreneaux = Math.floor((dureeTotale / duree) + 1e-9);
  if(nouveauNombreCreneaux < 1){ afficherToast('La durée d\'un créneau est plus grande que la plage indiquée.', 'erreur'); return; }

  const dates = [...new Set(state.executionSessions.filter(s => s.batchId === batchId).map(s => s.date))];
  const elevesExclus = [];
  let nbCreneauxAjoutes = 0, nbCreneauxRetires = 0;

  dates.forEach(date => {
    const sessionsExistantes = state.executionSessions
      .filter(s => s.batchId === batchId && s.date === date)
      .sort((a,b) => (a.startTime || '').localeCompare(b.startTime || ''));

    let curseur = debut;
    const idsAConserver = new Set();

    for(let i = 0; i < nouveauNombreCreneaux; i++){
      const finCreneau = ajouterHeuresAHeure(curseur, duree);
      if(sessionsExistantes[i]){
        // Créneau déjà existant à cet index : on garde son élève/paiement, on met juste à jour l'horaire.
        sessionsExistantes[i].startTime = curseur;
        sessionsExistantes[i].endTime = finCreneau;
        sessionsExistantes[i].hours = duree;
        idsAConserver.add(sessionsExistantes[i].id);
      }else{
        // Nouveau créneau (plage agrandie) : vide.
        state.executionSessions.push({
          id: genererId(), date, label: sessionsExistantes[0] ? sessionsExistantes[0].label : '',
          students: [], batchId, hours: duree, startTime: curseur, endTime: finCreneau
        });
        nbCreneauxAjoutes++;
      }
      curseur = finCreneau;
    }

    // Créneaux en trop (plage réduite) : on retire, en signalant les élèves concernés.
    sessionsExistantes.slice(nouveauNombreCreneaux).forEach(s => {
      const eleves = obtenirElevesSession(s);
      if(eleves.length > 0) elevesExclus.push(...eleves.map(nom => `${nom} (${formaterDate(date)} ${s.startTime || ''})`));
      state.executionSessions = state.executionSessions.filter(x => x.id !== s.id);
      nbCreneauxRetires++;
    });
  });

  let message = `Plage mise à jour sur ${dates.length} date(s).`;
  if(nbCreneauxAjoutes > 0) message += ` ${nbCreneauxAjoutes} créneau(x) vide(s) ajouté(s).`;
  if(nbCreneauxRetires > 0) message += ` ${nbCreneauxRetires} créneau(x) retiré(s).`;
  afficherToast(message, 'succes');

  enregistrerAction(`a modifié la plage horaire d'un lot de créneaux (${dates.length} date(s))`);
  batchIdEnModification = null;
  fermerModal();
  rendreBudget();
  rendreAccueil();

  // Avertissement à valider explicitement (pas un toast qui disparaît tout seul),
  // affiché APRÈS la fermeture de la modale et le rafraîchissement de l'écran.
  if(elevesExclus.length > 0){
    ouvrirModalAvertissement(
      'Créneaux réduits : élève(s) exclu(s)',
      elevesExclus
    );
  }
}

  if(!entree && state.team.length === 0){ afficherToast("Ajoute d'abord au moins un membre d'équipe.", 'erreur'); return; }
  if(!entree && state.executionSessions.length === 0){ afficherToast("Ajoute d'abord au moins une session d'exécution.", 'erreur'); return; }
  const optionsMembres = state.team.map(mb => `<option value="${mb.id}" ${entree && entree.memberId === mb.id ? 'selected' : ''}>${echapperHtml(mb.name)} (${mb.type === 'salarie' ? 'Salarié' : 'Bénévole'})</option>`).join('');
  const optionsSessions = state.executionSessions.slice().sort((a,b) => (a.date || '').localeCompare(b.date || '')).map(s => `<option value="${s.id}" ${entree && entree.sessionId === s.id ? 'selected' : ''}>${formaterDate(s.date)}${s.label ? ' — ' + echapperHtml(s.label) : ''} (${s.hours || 0} h prévues)</option>`).join('');
  const racine = document.getElementById('modal-root');
  racine.innerHTML = `
    <div class="modal-backdrop show" id="modal-exec-backdrop">
      <div class="modal-box">
        <h3 class="font-display" style="font-size:16px; font-weight:700; margin:0 0 16px 0;">${entree ? "Modifier les heures d'exécution" : "Ajouter des heures d'exécution"}</h3>
        <div style="display:flex; flex-direction:column; gap:12px;">
          <div>
            <label class="field-label">Membre</label>
            <select class="input-field" id="exec-membre">${optionsMembres}</select>
          </div>
          <div>
            <label class="field-label">Session d'exécution</label>
            <select class="input-field" id="exec-session">${optionsSessions}</select>
          </div>
          <div>
            <label class="field-label">Heures travaillées ce jour-là</label>
            <input type="number" class="input-field" id="exec-heures" min="0" step="0.25" placeholder="Ex. 3" value="${entree ? Number(entree.heures) || 0 : ''}">
          </div>
        </div>
        <div style="display:flex; gap:10px; margin-top:20px; justify-content:flex-end;">
          <button class="btn-secondary" onclick="fermerModal()">Annuler</button>
          <button class="btn-primary" onclick="enregistrerMainOeuvreExec()"><i data-lucide="check" style="width:15px;height:15px;"></i> ${entree ? 'Enregistrer les modifications' : 'Ajouter'}</button>
        </div>
      </div>
    </div>
  `;
  rafraichirIcones();
  document.getElementById('modal-exec-backdrop').addEventListener('click', (e) => { if(e.target.id === 'modal-exec-backdrop') fermerModal(); });
}

function enregistrerMainOeuvreExec(){
  const memberId = document.getElementById('exec-membre').value;
  const sessionId = document.getElementById('exec-session').value;
  const heures = parseFloat(document.getElementById('exec-heures').value) || 0;
  if(heures <= 0){ afficherToast('Indique un nombre d\'heures valide.', 'erreur'); return; }

  if(editingLaborId){
    const entree = state.labor.find(e => e.id === editingLaborId);
    if(entree){ entree.memberId = memberId; entree.sessionId = sessionId; entree.heures = heures; }
    afficherToast('Heures d\'exécution modifiées.', 'succes');
    editingLaborId = null;
    enregistrerAction('a modifié des heures d\'exécution pour ' + (trouverMembre(memberId) ? trouverMembre(memberId).name : 'un membre'));
  }else{
    state.labor.push({ id: genererId(), memberId, phase: 'execution', sessionId, heures });
    afficherToast('Heures d\'exécution ajoutées.', 'succes');
    editingLaborId = null;
    enregistrerAction('a ajouté des heures d\'exécution pour ' + (trouverMembre(memberId) ? trouverMembre(memberId).name : 'un membre'));
  }
  fermerModal();
  rendreBudget();
  rendreAccueil();
}

function supprimerMainOeuvre(id){
  state.labor = state.labor.filter(e => e.id !== id);
  enregistrerAction('a supprimé une entrée de main d\'œuvre');
  rendreBudget();
  rendreAccueil();
  afficherToast('Entrée supprimée.', 'info');
}

/* =========================================================================

function naviguerVers(vue){
  currentView = vue;
  document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + vue).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.view === vue));
  document.querySelectorAll('.bottom-nav-item').forEach(el => el.classList.toggle('active', el.dataset.view === vue));
  document.getElementById('main-area').scrollTop = 0;
  rendreVue(vue);
}

function rendreVue(vue){
  if(vue === 'accueil') rendreAccueil();
  else if(vue === 'config') rendreConfig();
  else if(vue === 'taches') rendreTaches();
  else if(vue === 'budget') rendreBudget();
  else if(vue === 'fichier') rendreFichier();
  else if(vue === 'sync') rendreSync();
}

function rendreTout(){
  rendreVue(currentView);
  mettreAJourStatutFichier();
  mettreAJourStatutSync();
}

          <input type="text" id="input-code-sync" class="input-field" maxlength="6" placeholder="EX: A3F9K2" style="text-transform:uppercase; font-family:'IBM Plex Mono',monospace; letter-spacing:.08em;">
          <button class="btn-secondary" onclick="rejoindreCodeSync(document.getElementById('input-code-sync').value)">OK</button>
        </div>
      </div>
    </div>

    <div class="card" style="padding:22px; margin-bottom:20px;">
      <h3 class="font-display" style="font-size:15px; font-weight:700; margin:0 0 6px 0;">Projets synchronisés</h3>
      <p style="font-size:12px; color:var(--ink-soft); margin:2px 0 14px 0;">Clique sur un projet pour l'ouvrir directement.</p>
      ${listeHtml}
    </div>
  `;
  rafraichirIcones();
}

/* =========================================================================
   SAISIE DÉCIMALE : accepte la virgule comme séparateur, partout dans l'app
   =========================================================================
   Les champs <input type="number"> refusent nativement la virgule si le
   navigateur n'est pas en locale française — la touche est simplement
   ignorée. On intercepte la frappe (et le collage) pour convertir la
   virgule en point AVANT que le navigateur ne la rejette, ce qui permet de
   garder les flèches +/- natives tout en acceptant "24,54" au clavier.
   Fonctionne sur tous les champs numériques présents ET futurs (délégation
   sur document, pas besoin de toucher chaque champ individuellement). */
document.addEventListener('keydown', function(e){
  if(e.key !== ',' || !e.target.matches('input[type="number"]')) return;
  const input = e.target;
  if(String(input.value).includes('.')) { e.preventDefault(); return; } // un seul séparateur décimal
  e.preventDefault();
  const debut = input.selectionStart;
  const fin = input.selectionEnd;
  const valeurActuelle = input.value || '';
  input.value = valeurActuelle.slice(0, debut) + '.' + valeurActuelle.slice(fin);
  input.setSelectionRange(debut + 1, debut + 1);
  input.dispatchEvent(new Event('input', { bubbles: true }));
}, true);

document.addEventListener('paste', function(e){
  if(!e.target.matches('input[type="number"]')) return;
  const texteColle = (e.clipboardData || window.clipboardData).getData('text');
  if(!texteColle || !texteColle.includes(',')) return;
  e.preventDefault();
  const input = e.target;
  const debut = input.selectionStart;
  const fin = input.selectionEnd;
  const texteConverti = texteColle.replace(/,/g, '.');
  const valeurActuelle = input.value || '';
  input.value = valeurActuelle.slice(0, debut) + texteConverti + valeurActuelle.slice(fin);
  const nouvellePosition = debut + texteConverti.length;
  input.setSelectionRange(nouvellePosition, nouvellePosition);
  input.dispatchEvent(new Event('input', { bubbles: true }));
});

   14. INITIALISATION
   ========================================================================= */
document.addEventListener('DOMContentLoaded', async () => {
  rafraichirIcones();

  document.querySelectorAll('.nav-item').forEach(el => {
    el.addEventListener('click', () => naviguerVers(el.dataset.view));
  });
  document.querySelectorAll('.bottom-nav-item').forEach(el => {
    el.addEventListener('click', () => naviguerVers(el.dataset.view));
  });

  await initialiserPersistance();

  // Synchronisation cloud : reprise automatique si une équipe était déjà active
  initialiserSupabase();
  reprendreSyncSiExistant();
  appliquerModeLectureSeule();

  rendreTout();

  // On ne force plus la création d'un fichier local : l'application
  // fonctionne désormais très bien uniquement via la synchronisation cloud.
  // On oriente juste doucement les nouveaux utilisateurs, sans les bloquer.
  if(!fileHandle && !syncProjectId){
    naviguerVers('sync');
    afficherToast("Crée ou rejoins une équipe (onglet Synchronisation) pour commencer, ou ouvre un fichier local si tu préfères.", 'info');
  }
});

/* =========================================================================
   PWA : ENREGISTREMENT DU SERVICE WORKER + BOUTON D'INSTALLATION
   ========================================================================= */
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js').catch((erreur) => {
      console.error('Échec de l\'enregistrement du service worker :', erreur);
    });
  });
}

let evenementInstallationDiffere = null;

window.addEventListener('beforeinstallprompt', (evenement) => {
  // Empêche la mini-bannière automatique du navigateur pour proposer
  // notre propre bouton, intégré à l'interface.
  evenement.preventDefault();
  evenementInstallationDiffere = evenement;
  const bouton = document.getElementById('install-pwa-btn');
  if(bouton) bouton.style.display = 'flex';
});

document.getElementById('install-pwa-btn').addEventListener('click', async () => {
  if(!evenementInstallationDiffere) return;
  evenementInstallationDiffere.prompt();
  const { outcome } = await evenementInstallationDiffere.userChoice;
  if(outcome === 'accepted'){
    afficherToast('Application installée avec succès.', 'succes');
  }
  evenementInstallationDiffere = null;
  document.getElementById('install-pwa-btn').style.display = 'none';
});

window.addEventListener('appinstalled', () => {
  const bouton = document.getElementById('install-pwa-btn');
  if(bouton) bouton.style.display = 'none';
});
</script>
