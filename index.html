<style>
  :root{
    --bg:#F6F7F5;
    --surface:#FFFFFF;
    --surface-2:#EFF2EF;
    --ink:#182024;
    --ink-soft:#5B6A6D;
    --primary:#0F5257;
    --primary-dark:#0B3A3E;
    --primary-soft:#E4EEEE;
    --accent:#E3A008;
    --accent-soft:#FCF0D3;
    --success:#2F9E44;
    --success-soft:#E6F6EA;
    --danger:#E03131;
    --danger-soft:#FCE9E9;
    --border:#E2E6E4;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    overscroll-behavior:none;
  }
  h1,h2,h3,h4,.font-display{font-family:'Sora',system-ui,sans-serif;}
  .font-mono-num{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:#D3D9D6;border-radius:8px;}
  ::-webkit-scrollbar-track{background:transparent;}

  .app-shell{display:flex; height:100vh; overflow:hidden;}

  /* Sidebar (desktop) */
  .sidebar{
    width:260px; flex-shrink:0; background:var(--surface);
    border-right:1px solid var(--border);
    display:flex; flex-direction:column;
    padding:20px 14px;
  }
  .brand{display:flex; align-items:center; gap:10px; padding:6px 8px 22px 8px;}
  .brand-mark{
    width:36px;height:36px;border-radius:10px;
    background:linear-gradient(135deg, var(--primary), var(--primary-dark));
    display:flex;align-items:center;justify-content:center; color:white; flex-shrink:0;
  }
  .nav-item{
    display:flex; align-items:center; gap:12px;
    padding:11px 14px; border-radius:12px; color:var(--ink-soft);
    font-weight:600; font-size:14.5px; cursor:pointer; user-select:none;
    transition:background .15s ease, color .15s ease, transform .1s ease;
    margin-bottom:4px;
  }
  .nav-item:hover{background:var(--surface-2); color:var(--ink);}
  .nav-item.active{background:var(--primary-soft); color:var(--primary-dark);}
  .nav-item:active{transform:scale(0.98);}
  .nav-item svg{width:19px;height:19px; flex-shrink:0;}

  .file-status-box{
    margin-top:auto; padding:12px; border-radius:14px; background:var(--surface-2);
    font-size:12.5px; color:var(--ink-soft); line-height:1.5;
  }
  .file-status-dot{width:8px;height:8px;border-radius:50%; display:inline-block; margin-right:6px;}

  /* Main content */
  .main-area{flex:1; overflow-y:auto; padding:28px 34px 100px 34px;}
  .view-section{display:none; animation:fadeUp .28s ease;}
  .view-section.active{display:block;}
  @keyframes fadeUp{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

  .card{background:var(--surface); border:1px solid var(--border); border-radius:16px; box-shadow:0 1px 2px rgba(20,30,30,0.03);}
  .btn-primary{
    background:var(--primary); color:white; font-weight:600; font-size:14px;
    padding:10px 18px; border-radius:11px; display:inline-flex; align-items:center; gap:8px;
    transition:background .15s ease, transform .1s ease; border:none; cursor:pointer;
  }
  .btn-primary:hover{background:var(--primary-dark);}
  .btn-primary:active{transform:scale(0.97);}
  .btn-secondary{
    background:var(--surface); color:var(--ink); font-weight:600; font-size:14px;
    padding:10px 18px; border-radius:11px; display:inline-flex; align-items:center; gap:8px;
    transition:background .15s ease, transform .1s ease; border:1px solid var(--border); cursor:pointer;
  }
  .btn-secondary:hover{background:var(--surface-2);}
  .btn-secondary:active{transform:scale(0.97);}
  .btn-danger-ghost{
    color:var(--danger); background:transparent; border:none; cursor:pointer;
    padding:6px; border-radius:8px; transition:background .15s ease;
  }
  .btn-danger-ghost:hover{background:var(--danger-soft);}

  .btn-edit-ghost{
    color:var(--ink-soft); background:transparent; border:none; cursor:pointer;
    padding:6px; border-radius:8px; transition:background .15s ease, color .15s ease;
  }
  .btn-edit-ghost:hover{background:var(--primary-soft); color:var(--primary-dark);}

  .input-field{
    width:100%; padding:10px 12px; border-radius:10px; border:1px solid var(--border);
    background:var(--surface); font-size:14px; color:var(--ink); font-family:'Inter',sans-serif;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  .input-field:focus{outline:none; border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-soft);}
  .field-label{font-size:12.5px; font-weight:600; color:var(--ink-soft); margin-bottom:6px; display:block;}

  .badge{font-size:11.5px; font-weight:700; padding:3px 9px; border-radius:999px; letter-spacing:.02em;}
  .kpi-value{font-size:28px; font-weight:700; letter-spacing:-0.01em;}

  .progress-track{width:100%; height:9px; background:var(--surface-2); border-radius:999px; overflow:hidden;}
  .progress-fill{height:100%; border-radius:999px; transition:width .5s cubic-bezier(.4,0,.2,1); background:linear-gradient(90deg, var(--primary), var(--primary-dark));}

  input[type=range].slider{
    -webkit-appearance:none; width:100%; height:6px; border-radius:999px; background:var(--surface-2); outline:none;
  }
  input[type=range].slider::-webkit-slider-thumb{
    -webkit-appearance:none; width:20px; height:20px; border-radius:50%; background:var(--primary);
    border:3px solid white; box-shadow:0 1px 4px rgba(0,0,0,0.25); cursor:pointer; margin-top:0px;
  }
  input[type=range].slider::-moz-range-thumb{
    width:20px; height:20px; border-radius:50%; background:var(--primary); border:3px solid white;
    box-shadow:0 1px 4px rgba(0,0,0,0.25); cursor:pointer;
  }

  table.data-table{width:100%; border-collapse:collapse; font-size:13.5px;}
  table.data-table thead th{
    text-align:left; font-size:11.5px; text-transform:uppercase; letter-spacing:.04em;
    color:var(--ink-soft); font-weight:700; padding:0 12px 10px 12px; border-bottom:1px solid var(--border);
  }
  table.data-table tbody td{padding:12px; border-bottom:1px solid var(--border); vertical-align:middle;}
  table.data-table tbody tr:last-child td{border-bottom:none;}
  table.data-table tbody tr{transition:background .12s ease;}
  table.data-table tbody tr:hover{background:var(--surface-2);}

  .toast{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:white; padding:11px 20px; border-radius:12px; font-size:13.5px; font-weight:600;
    opacity:0; pointer-events:none; transition:all .25s cubic-bezier(.4,0,.2,1); z-index:200; box-shadow:0 8px 24px rgba(0,0,0,0.2);
    display:flex; align-items:center; gap:8px;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto;}

  /* Bottom nav (mobile) */
  .bottom-nav{
    display:none; position:fixed; bottom:0; left:0; right:0; background:var(--surface);
    border-top:1px solid var(--border); padding:8px 4px calc(env(safe-area-inset-bottom,0px) + 6px) 4px;
    z-index:100; box-shadow:0 -2px 12px rgba(0,0,0,0.05);
  }
  .bottom-nav-inner{display:flex; justify-content:space-around;}
  .bottom-nav-item{
    display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--ink-soft);
    font-size:10.5px; font-weight:600; padding:5px 8px; border-radius:12px; transition:color .15s ease;
  }
  .bottom-nav-item svg{width:21px;height:21px;}
  .bottom-nav-item.active{color:var(--primary);}

  .modal-backdrop{
    position:fixed; inset:0; background:rgba(15,25,26,0.45); z-index:150; display:none;
    align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(2px);
  }
  .modal-backdrop.show{display:flex;}
  .modal-box{background:var(--surface); border-radius:18px; padding:24px; width:100%; max-width:440px; max-height:88vh; overflow-y:auto; animation:fadeUp .2s ease;}

  @media (max-width:860px){
    .sidebar{display:none;}
    .main-area{padding:18px 16px 92px 16px;}
    .bottom-nav{display:block;}
  }
</style>

<script>
/* =========================================================================
   1. ÉTAT GLOBAL DE L'APPLICATION
   ========================================================================= */
const STORAGE_DB_NAME = 'asbl-gestion-db';
const STORAGE_DB_VERSION = 2;
const STORAGE_STORE_NAME = 'handles';
const STORAGE_HANDLE_KEY = 'projectFileHandle';
const PROJECTS_STORE_NAME = 'savedProjects';
const LOCAL_CACHE_KEY = 'asbl_gestion_local_cache_v1';

function creerEtatVide(){
  return {
    project: {
      name: 'Mon projet ASBL',
      description: '',
      objectives: '',
      startDate: '',
      endDate: '',
      status: 'planification'
    },
    team: [],
    tasks: [],
    expenses: [],
    executionSessions: [],
    labor: [],
    simulator: {
      participants: 50,
      ticketPrice: 20
    },
    meta: {
      createdAt: new Date().toISOString(),
      lastModified: new Date().toISOString()
    }
  };
}

let state = creerEtatVide();
let fileHandle = null;
let isMobileFileMode = false;
let autosaveTimer = null;
let currentView = 'accueil';
let profitChartInstance = null;
let editingTaskId = null;
let editingMemberId = null;
let editingExpenseId = null;
let editingSessionId = null;
let editingLaborId = null;

/* =========================================================================
   SYNCHRONISATION TEMPS RÉEL ENTRE APPAREILS (Supabase)
   =========================================================================
   PRINCIPE : tous les appareils qui utilisent le même "code d'équipe"
   partagent la même ligne dans une table Supabase. Dès qu'un appareil
   modifie le projet, la nouvelle version est envoyée au serveur, qui la
   redistribue instantanément à tous les autres appareils connectés
   (via WebSocket — pas besoin de rafraîchir la page).

   ⚠️ CONFIGURATION REQUISE : remplacez les deux valeurs ci-dessous par
   celles de votre propre projet Supabase (gratuit) avant de déployer.
   Voir le guide fourni pour la marche à suivre pas à pas.
   ========================================================================= */
const SUPABASE_URL = 'https://axihduusjdpxbpzohajd.supabase.co/rest/v1/';        // ex : https://xxxxxxxx.supabase.co
const SUPABASE_ANON_KEY = 'sb_publishable_rr6dnokRb9Lgik33AfAucQ_sKt_FR6o';

const SYNC_TABLE = 'asbl_projects';
const SYNC_CODE_KEY = 'asbl_sync_code';
const CLIENT_ID_KEY = 'asbl_client_id';

let supabaseClient = null;
let syncCode = null;
let syncChannel = null;
let syncPushTimer = null;
let syncStatus = 'non-configure'; // 'non-configure' | 'deconnecte' | 'connexion' | 'connecte' | 'erreur'

// Identifiant unique à cet appareil/onglet, pour ignorer nos propres
// mises à jour quand elles nous reviennent via le temps réel.
function obtenirIdClient(){
  let id = localStorage.getItem(CLIENT_ID_KEY);
  if(!id){
    id = 'client_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 10);
    localStorage.setItem(CLIENT_ID_KEY, id);
  }
  return id;
}
const idClientActuel = obtenirIdClient();

function supabaseEstConfigure(){
  return !!SUPABASE_URL && SUPABASE_URL.indexOf('https://') === 0 &&
         !!SUPABASE_ANON_KEY && SUPABASE_ANON_KEY.length > 20;
}

function initialiserSupabase(){
  if(!supabaseEstConfigure()) { syncStatus = 'non-configure'; return; }
  if(supabaseClient) return;
  supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
}

function genererCodeAleatoire(){
  const alphabet = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // sans caractères ambigus (0/O, 1/I...)
  let code = '';
  for(let i = 0; i < 6; i++){
    code += alphabet[Math.floor(Math.random() * alphabet.length)];
  }
  return code;
}

/* --- Créer un nouveau code d'équipe et y publier le projet actuel --- */
async function creerNouveauCodeSync(){
  if(!supabaseEstConfigure()){
    afficherToast("La synchronisation n'est pas encore configurée.", 'erreur');
    return;
  }
  initialiserSupabase();
  const nouveauCode = genererCodeAleatoire();
  syncStatus = 'connexion';
  mettreAJourStatutSync();
  try{
    const { error } = await supabaseClient.from(SYNC_TABLE).insert({
      id: nouveauCode,
      data: state,
      updated_at: new Date().toISOString(),
      updated_by: idClientActuel
    });
    if(error) throw error;
    syncCode = nouveauCode;
    localStorage.setItem(SYNC_CODE_KEY, syncCode);
    souscrireAuTempsReel();
    syncStatus = 'connecte';
    afficherToast('Code d\'équipe créé : ' + syncCode, 'succes');
  }catch(erreur){
    console.error(erreur);
    syncStatus = 'erreur';
    afficherToast("Impossible de créer le code de synchronisation.", 'erreur');
  }
  mettreAJourStatutSync();
  if(currentView === 'sync') rendreSync();
}

/* --- Rejoindre un code d'équipe existant : on récupère la dernière version --- */
async function rejoindreCodeSync(code){
  const codePropre = (code || '').trim().toUpperCase();
  if(!codePropre){
    afficherToast('Entre un code d\'équipe valide.', 'erreur');
    return;
  }
  if(!supabaseEstConfigure()){
    afficherToast("La synchronisation n'est pas encore configurée.", 'erreur');
    return;
  }
  initialiserSupabase();
  syncStatus = 'connexion';
  mettreAJourStatutSync();
  try{
    const { data: ligne, error } = await supabaseClient
      .from(SYNC_TABLE)
      .select('*')
      .eq('id', codePropre)
      .maybeSingle();
    if(error) throw error;
    if(!ligne){
      afficherToast("Aucune équipe ne correspond à ce code.", 'erreur');
      syncStatus = 'erreur';
      mettreAJourStatutSync();
      return;
    }
    state = fusionnerAvecEtatVide(ligne.data);
    syncCode = codePropre;
    localStorage.setItem(SYNC_CODE_KEY, syncCode);
    souscrireAuTempsReel();
    syncStatus = 'connecte';
    afficherToast('Connecté à l\'équipe ' + syncCode + '.', 'succes');
    naviguerVers('accueil');
    rendreTout();
  }catch(erreur){
    console.error(erreur);
    syncStatus = 'erreur';
    afficherToast("Impossible de rejoindre ce code.", 'erreur');
  }
  mettreAJourStatutSync();
  if(currentView === 'sync') rendreSync();
}

/* --- Se déconnecter du code d'équipe (reste en local uniquement) --- */
function quitterSync(){
  if(syncChannel){ supabaseClient.removeChannel(syncChannel); syncChannel = null; }
  syncCode = null;
  localStorage.removeItem(SYNC_CODE_KEY);
  syncStatus = 'deconnecte';
  mettreAJourStatutSync();
  afficherToast('Synchronisation désactivée sur cet appareil.', 'info');
  if(currentView === 'sync') rendreSync();
}

/* --- Écoute en temps réel des changements envoyés par les AUTRES appareils --- */
function souscrireAuTempsReel(){
  if(!supabaseClient || !syncCode) return;
  if(syncChannel) supabaseClient.removeChannel(syncChannel);

  syncChannel = supabaseClient
    .channel('sync-' + syncCode)
    .on('postgres_changes',
      { event: 'UPDATE', schema: 'public', table: SYNC_TABLE, filter: 'id=eq.' + syncCode },
      (payload) => {
        // On ignore nos propres écritures (déjà appliquées localement)
        if(payload.new.updated_by === idClientActuel) return;
        state = fusionnerAvecEtatVide(payload.new.data);
        rendreTout();
        afficherToast('Mis à jour depuis un autre appareil.', 'info');
      }
    )
    .subscribe((statut) => {
      if(statut === 'SUBSCRIBED'){ syncStatus = 'connecte'; }
      else if(statut === 'CHANNEL_ERROR' || statut === 'TIMED_OUT'){ syncStatus = 'erreur'; }
      mettreAJourStatutSync();
    });
}

/* --- Envoi (avec anti-rebond) de l'état local vers le serveur --- */
function planifierEnvoiCloud(){
  if(!syncCode || !supabaseClient) return;
  clearTimeout(syncPushTimer);
  syncPushTimer = setTimeout(async () => {
    try{
      const { error } = await supabaseClient.from(SYNC_TABLE).update({
        data: state,
        updated_at: new Date().toISOString(),
        updated_by: idClientActuel
      }).eq('id', syncCode);
      if(error) throw error;
      syncStatus = 'connecte';
    }catch(erreur){
      console.error(erreur);
      syncStatus = 'erreur';
    }
    mettreAJourStatutSync();
  }, 700);
}

/* --- Reprise automatique de la synchronisation au chargement de la page --- */
function reprendreSyncSiExistant(){
  if(!supabaseEstConfigure()) return;
  const codeEnregistre = localStorage.getItem(SYNC_CODE_KEY);
  if(!codeEnregistre) return;
  initialiserSupabase();
  syncCode = codeEnregistre;
  syncStatus = 'connexion';
  souscrireAuTempsReel();
}

function mettreAJourStatutSync(){
  const pastille = document.getElementById('sync-status-dot');
  const texte = document.getElementById('sync-status-text');
  if(!pastille || !texte) return;
  const couleurs = {
    'non-configure': ['var(--ink-soft)', 'Synchronisation non configurée'],
    'deconnecte': ['var(--ink-soft)', 'Synchronisation désactivée'],
    'connexion': ['var(--accent)', 'Connexion en cours…'],
    'connecte': ['var(--success)', 'Synchronisé — équipe ' + (syncCode || '')],
    'erreur': ['var(--danger)', 'Erreur de synchronisation']
  };
  const [couleur, libelle] = couleurs[syncStatus] || couleurs['non-configure'];
  pastille.style.background = couleur;
  texte.textContent = libelle;

  const pastilleVue = document.getElementById('sync-status-dot-view');
  const texteVue = document.getElementById('sync-status-text-view');
  if(pastilleVue) pastilleVue.style.background = couleur;
  if(texteVue) texteVue.textContent = libelle;
}

function genererId(){
  return 'id_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 9);
}

/* =========================================================================
   2. UTILITAIRES D'AFFICHAGE
   ========================================================================= */
function formaterMontant(valeur){
  const nombre = Number(valeur) || 0;
  return nombre.toLocaleString('fr-BE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';
}

function formaterDate(dateStr){
  if(!dateStr) return '—';
  const d = new Date(dateStr);
  if(isNaN(d.getTime())) return '—';
  return d.toLocaleDateString('fr-BE', { day:'2-digit', month:'short', year:'numeric' });
}

function formaterHeure(date){
  return date.toLocaleTimeString('fr-BE', { hour:'2-digit', minute:'2-digit' });
}

function echapperHtml(str){
  const div = document.createElement('div');
  div.textContent = str == null ? '' : String(str);
  return div.innerHTML;
}

function afficherToast(message, type){
  const toastEl = document.getElementById('toast');

  clearTimeout(afficherToast._timer);

/* =========================================================================
   4. INDEXEDDB — MÉMORISATION DU HANDLE DE FICHIER ENTRE LES SESSIONS
   ========================================================================= */
function ouvrirBaseHandles(){
  return new Promise((resolve, reject) => {
    const requete = indexedDB.open(STORAGE_DB_NAME, STORAGE_DB_VERSION);
    requete.onupgradeneeded = (evenement) => {
      const db = evenement.target.result;
      if(!db.objectStoreNames.contains(STORAGE_STORE_NAME)){
        db.createObjectStore(STORAGE_STORE_NAME);
      }
      if(!db.objectStoreNames.contains(PROJECTS_STORE_NAME)){
        db.createObjectStore(PROJECTS_STORE_NAME, { keyPath: 'id' });
      }
    };
    requete.onsuccess = () => resolve(requete.result);
    requete.onerror = () => reject(requete.error);
  });
}

async function enregistrerHandleEnBase(handle){
  try{
    const db = await ouvrirBaseHandles();
    await new Promise((resolve, reject) => {
      const tx = db.transaction(STORAGE_STORE_NAME, 'readwrite');
      tx.objectStore(STORAGE_STORE_NAME).put(handle, STORAGE_HANDLE_KEY);
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    });
    db.close();
  }catch(erreur){
    console.warn('Impossible de mémoriser le handle de fichier :', erreur);
  }
}

async function chargerHandleDepuisBase(){
  try{
    const db = await ouvrirBaseHandles();
    const handle = await new Promise((resolve, reject) => {
      const tx = db.transaction(STORAGE_STORE_NAME, 'readonly');
      const requete = tx.objectStore(STORAGE_STORE_NAME).get(STORAGE_HANDLE_KEY);
      requete.onsuccess = () => resolve(requete.result || null);
      requete.onerror = () => reject(requete.error);
    });
    db.close();
    return handle;
  }catch(erreur){
    console.warn('Impossible de récupérer le handle de fichier :', erreur);
    return null;
  }
}

async function effacerHandleEnBase(){
  try{
    const db = await ouvrirBaseHandles();
    await new Promise((resolve, reject) => {
      const tx = db.transaction(STORAGE_STORE_NAME, 'readwrite');
      tx.objectStore(STORAGE_STORE_NAME).delete(STORAGE_HANDLE_KEY);
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    });
    db.close();
  }catch(erreur){
    console.warn('Impossible de supprimer le handle de fichier :', erreur);
  }
}

/* =========================================================================
   4bis. INDEXEDDB — LISTE DES PROJETS ENREGISTRÉS (accès rapide en un clic)
   ========================================================================= */
function formaterDateCourte(dateStr){
  if(!dateStr) return '';
  const d = new Date(dateStr);
  if(isNaN(d.getTime())) return '';
  return d.toLocaleDateString('fr-BE', { day: 'numeric', month: 'long' });
}

function calculerLibelleProjetCourant(){
  const nom = state.project.name || 'Projet sans nom';
  let dateLabel = '';
  if(state.executionSessions && state.executionSessions.length > 0){
    const premiere = state.executionSessions.slice().sort((a, b) => (a.date || '').localeCompare(b.date || ''))[0];
    dateLabel = formaterDateCourte(premiere.date);
  }
  return { nom, dateLabel };
}

async function listerProjetsEnregistres(){
  try{
    const db = await ouvrirBaseHandles();
    const liste = await new Promise((resolve, reject) => {
      const tx = db.transaction(PROJECTS_STORE_NAME, 'readonly');
      const requete = tx.objectStore(PROJECTS_STORE_NAME).getAll();
      requete.onsuccess = () => resolve(requete.result || []);
      requete.onerror = () => reject(requete.error);
    });
    db.close();
    return liste.sort((a, b) => (b.lastSaved || '').localeCompare(a.lastSaved || ''));
  }catch(erreur){
    console.warn('Impossible de lister les projets enregistrés :', erreur);
    return [];
  }
}

async function ajouterOuMettreAJourProjetDansListe(handle){
  try{
    const { nom, dateLabel } = calculerLibelleProjetCourant();
    const db = await ouvrirBaseHandles();
    const entrees = await new Promise((resolve, reject) => {
      const tx = db.transaction(PROJECTS_STORE_NAME, 'readonly');
      const requete = tx.objectStore(PROJECTS_STORE_NAME).getAll();
      requete.onsuccess = () => resolve(requete.result || []);
      requete.onerror = () => reject(requete.error);
    });

    let entreeExistante = null;
    for(const entree of entrees){
      try{
        if(entree.handle && typeof entree.handle.isSameEntry === 'function' && await entree.handle.isSameEntry(handle)){
          entreeExistante = entree;
          break;
        }
      }catch(e){ /* handle invalide, on ignore */ }
    }

    const enregistrement = {
      id: entreeExistante ? entreeExistante.id : genererId(),
      name: nom,
      dateLabel: dateLabel,
      handle: handle,
      lastSaved: new Date().toISOString()
    };

    await new Promise((resolve, reject) => {
      const tx = db.transaction(PROJECTS_STORE_NAME, 'readwrite');
      tx.objectStore(PROJECTS_STORE_NAME).put(enregistrement);
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    });
    db.close();
  }catch(erreur){
    console.warn('Impossible de mettre à jour la liste des projets enregistrés :', erreur);
  }
}

async function supprimerProjetDeListe(id){
  try{
    const db = await ouvrirBaseHandles();
    await new Promise((resolve, reject) => {
      const tx = db.transaction(PROJECTS_STORE_NAME, 'readwrite');
      tx.objectStore(PROJECTS_STORE_NAME).delete(id);
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    });
    db.close();
  }catch(erreur){
    console.warn('Impossible de retirer ce projet de la liste :', erreur);
  }
}

/* =========================================================================
   5. FILE SYSTEM ACCESS API — CRÉATION / OUVERTURE / ÉCRITURE PHYSIQUE
   ========================================================================= */
async function creerNouveauFichierProjet(){
  if(!supportFileSystemAccess()){
    afficherToast("Ton navigateur ne supporte pas la création de fichier physique.", 'erreur');
    return;
  }
  try{
    const handle = await window.showSaveFilePicker({
      suggestedName: 'projet-asbl.json',
      types: [{ description: 'Fichier de projet ASBL', accept: { 'application/json': ['.json'] } }]
    });
    fileHandle = handle;
    state = creerEtatVide();
    await ecrireEtatDansFichier();
    await enregistrerHandleEnBase(handle);
    await ajouterOuMettreAJourProjetDansListe(handle);
    mettreAJourStatutFichier();
    afficherToast('Nouveau fichier de projet créé.', 'succes');
    naviguerVers('accueil');
    rendreTout();
  }catch(erreur){
    if(erreur && erreur.name !== 'AbortError'){
      console.error(erreur);
      afficherToast("La création du fichier a échoué.", 'erreur');
    }
  }
}

async function ouvrirFichierProjetExistant(){
  if(!supportFileSystemAccess()){
    afficherToast("Ton navigateur ne supporte pas l'ouverture de fichier physique.", 'erreur');
    return;
  }
  try{
    const [handle] = await window.showOpenFilePicker({
      types: [{ description: 'Fichier de projet ASBL', accept: { 'application/json': ['.json'] } }],
      multiple: false
    });
    fileHandle = handle;
    const fichier = await handle.getFile();
    const texte = await fichier.text();
    const donnees = JSON.parse(texte);
    state = fusionnerAvecEtatVide(donnees);
    await enregistrerHandleEnBase(handle);
    await ajouterOuMettreAJourProjetDansListe(handle);
    mettreAJourStatutFichier();
    afficherToast('Fichier de projet chargé.', 'succes');
    naviguerVers('accueil');
    rendreTout();
  }catch(erreur){
    if(erreur && erreur.name !== 'AbortError'){
      console.error(erreur);
      afficherToast("L'ouverture du fichier a échoué ou le fichier est invalide.", 'erreur');
    }
  }
}

function fusionnerAvecEtatVide(donnees){
  const base = creerEtatVide();
  return {
    project: Object.assign({}, base.project, donnees.project || {}),
    team: Array.isArray(donnees.team) ? donnees.team : [],
    tasks: Array.isArray(donnees.tasks) ? donnees.tasks : [],
    expenses: Array.isArray(donnees.expenses) ? donnees.expenses : [],
    executionSessions: Array.isArray(donnees.executionSessions) ? donnees.executionSessions : [],
    labor: Array.isArray(donnees.labor) ? donnees.labor : [],
    simulator: Object.assign({}, base.simulator, donnees.simulator || {}),
    meta: Object.assign({}, base.meta, donnees.meta || {})
  };
}

async function verifierEtRestaurerPermission(handle){
  try{
    const options = { mode: 'readwrite' };
    const permissionActuelle = await handle.queryPermission(options);
    if(permissionActuelle === 'granted') return true;
    return false;
  }catch(erreur){
    return false;
  }
}

async function demanderPermission(handle){
  try{
    const options = { mode: 'readwrite' };
    const resultat = await handle.requestPermission(options);
    return resultat === 'granted';
  }catch(erreur){
    return false;
  }
}

async function ecrireEtatDansFichier(){
  if(!fileHandle) return false;
  try{
    state.meta.lastModified = new Date().toISOString();
    const writable = await fileHandle.createWritable();
    await writable.write(JSON.stringify(state, null, 2));
    await writable.close();
    return true;
  }catch(erreur){
    console.error('Échec de l\'écriture du fichier physique :', erreur);
    afficherToast("La sauvegarde automatique a échoué. Vérifie l'accès au fichier.", 'erreur');
    return false;
  }
}

function planifierSauvegarde(){
  state.meta.lastModified = new Date().toISOString();

  // Synchronisation cloud : envoyée à chaque modification, indépendamment
  // du mode de sauvegarde locale (fichier physique ou cache mobile).
  planifierEnvoiCloud();

  if(isMobileFileMode){
    try{ localStorage.setItem(LOCAL_CACHE_KEY, JSON.stringify(state)); }catch(e){}
    mettreAJourStatutFichier();
    return;
  }
  if(!fileHandle) return;
  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(async () => {
    const ok = await ecrireEtatDansFichier();
    if(ok) mettreAJourStatutFichier();
  }, 450);
}

/* --- Ouverture en un clic depuis la liste des projets enregistrés --- */
async function ouvrirProjetDepuisListe(id){
  try{
    const db = await ouvrirBaseHandles();
    const entree = await new Promise((resolve, reject) => {
      const tx = db.transaction(PROJECTS_STORE_NAME, 'readonly');
      const requete = tx.objectStore(PROJECTS_STORE_NAME).get(id);
      requete.onsuccess = () => resolve(requete.result || null);
      requete.onerror = () => reject(requete.error);
    });
    db.close();
    if(!entree || !entree.handle){
      afficherToast("Ce projet n'est plus accessible.", 'erreur');
      return;
    }

    const dejaAutorise = await verifierEtRestaurerPermission(entree.handle);
    const autorise = dejaAutorise || await demanderPermission(entree.handle);
    if(!autorise){
      afficherToast("Accès au fichier refusé.", 'erreur');
      return;
    }

    const fichier = await entree.handle.getFile();
    const texte = await fichier.text();
    const donnees = JSON.parse(texte);
    state = fusionnerAvecEtatVide(donnees);
    fileHandle = entree.handle;
    await enregistrerHandleEnBase(entree.handle);
    mettreAJourStatutFichier();
    afficherToast('Projet « ' + (entree.name || 'sans nom') + ' » ouvert.', 'succes');
    naviguerVers('accueil');
    rendreTout();
  }catch(erreur){
    console.error(erreur);
    afficherToast("Impossible d'ouvrir ce projet.", 'erreur');
  }
}

/* --- Bouton « Enregistrer le projet » : checkpoint manuel + mise à jour de la liste --- */
async function enregistrerProjetActuel(){
  if(!fileHandle){
    await creerNouveauFichierProjet();
    return;
  }
  const ok = await ecrireEtatDansFichier();
  if(!ok) return;
  await ajouterOuMettreAJourProjetDansListe(fileHandle);
  mettreAJourStatutFichier();
  if(currentView === 'fichier') rendreFichier();
  afficherToast('Projet enregistré dans la liste.', 'succes');
}

async function retirerProjetDeListe(id, evenement){
  if(evenement) evenement.stopPropagation();
  await supprimerProjetDeListe(id);
  afficherToast('Projet retiré de la liste.', 'info');
  if(currentView === 'fichier') rendreFichier();
}

   6. FALLBACK MOBILE — EXPORT / IMPORT MANUEL DU FICHIER JSON
   ========================================================================= */
function exporterFichierJson(){
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const lien = document.createElement('a');
  const nomFichier = (state.project.name || 'projet-asbl').toLowerCase().replace(/[^a-z0-9]+/g, '-') + '.json';
  lien.href = url;
  lien.download = nomFichier;
  document.body.appendChild(lien);
  lien.click();
  document.body.removeChild(lien);
  URL.revokeObjectURL(url);
  afficherToast('Fichier JSON exporté.', 'succes');
}

function importerFichierJson(fichierInput){
  const fichier = fichierInput.files && fichierInput.files[0];
  if(!fichier) return;
  const lecteur = new FileReader();
  lecteur.onload = () => {
    try{
      const donnees = JSON.parse(lecteur.result);
      state = fusionnerAvecEtatVide(donnees);
      isMobileFileMode = true;
      try{ localStorage.setItem(LOCAL_CACHE_KEY, JSON.stringify(state)); }catch(e){}
      mettreAJourStatutFichier();
      afficherToast('Fichier JSON importé avec succès.', 'succes');
      naviguerVers('accueil');
      rendreTout();
    }catch(erreur){
      afficherToast("Le fichier sélectionné n'est pas valide.", 'erreur');
    }
  };
  lecteur.readAsText(fichier);
  fichierInput.value = '';
}

function mettreAJourStatutFichier(){
  const texteEl = document.getElementById('file-status-text');
  const sousTexteEl = document.getElementById('file-status-sub');
  const boiteEl = document.getElementById('file-status-box');
  const point = boiteEl.querySelector('.file-status-dot');
  const heureMaj = state.meta && state.meta.lastModified ? new Date(state.meta.lastModified) : null;

  if(!supportFileSystemAccess()){
    if(isMobileFileMode){
      texteEl.textContent = 'Mode mobile — cache local actif';
      point.style.background = 'var(--accent)';
      sousTexteEl.textContent = heureMaj ? ('Sauvegardé en cache à ' + formaterHeure(heureMaj) + ' · pense à exporter') : 'Pense à exporter régulièrement';
    }else{
      texteEl.textContent = 'Aucun fichier importé';
      point.style.background = 'var(--danger)';
      sousTexteEl.textContent = 'Importe un fichier JSON pour commencer';
    }
    return;
  }

  if(fileHandle){
    texteEl.textContent = 'Connecté : ' + (fileHandle.name || 'fichier.json');
    point.style.background = 'var(--success)';
    sousTexteEl.textContent = heureMaj ? ('Sauvegardé à ' + formaterHeure(heureMaj)) : 'Sauvegarde automatique active';
  }else{
    texteEl.textContent = 'Aucun fichier connecté';
    point.style.background = 'var(--danger)';
    sousTexteEl.textContent = "Rends-toi dans l'onglet Fichier projet";
  }
  document.getElementById('sidebar-project-name').textContent = state.project.name || 'Mon ASBL';
}

async function initialiserPersistance(){
  isMobileFileMode = !supportFileSystemAccess();

  if(!isMobileFileMode){
    const handleSauvegarde = await chargerHandleDepuisBase();
    if(handleSauvegarde){
      const dejaAutorise = await verifierEtRestaurerPermission(handleSauvegarde);
      if(dejaAutorise){
        try{
          const fichier = await handleSauvegarde.getFile();
          const texte = await fichier.text();
          state = fusionnerAvecEtatVide(JSON.parse(texte));
          fileHandle = handleSauvegarde;
        }catch(erreur){
          console.warn('Handle enregistré invalide, reconnexion nécessaire.', erreur);
        }
      }
    }
  }else{
    try{
      const cache = localStorage.getItem(LOCAL_CACHE_KEY);
      if(cache) state = fusionnerAvecEtatVide(JSON.parse(cache));
    }catch(e){}
  }
  mettreAJourStatutFichier();
}

/* =========================================================================
   7. MOTEUR DE CALCUL MÉTIER
   ========================================================================= */
function trouverMembre(id){
  return state.team.find(m => m.id === id) || null;
}

function trouverSession(id){
  return state.executionSessions.find(s => s.id === id) || null;
}

/* --- Sessions d'exécution : base du prorata --- */
function calculerNbJoursExecution(){
  return state.executionSessions.length;
}

function calculerHeuresExecutionTotal(){
  return state.executionSessions.reduce((somme, s) => somme + (Number(s.hours) || 0), 0);
}

function libelleModeDepense(mode){
  return {
    ponctuel_fixe: 'Ponctuel — montant fixe',
    ponctuel_jour: 'Ponctuel — par jour d\'exécution',
    hebdo: 'Hebdomadaire (prorata)',
    mensuel: 'Mensuel (prorata)',
    annuel: 'Annuel (prorata)',
    horaire: 'Tarif horaire (× heures totales)'
  }[mode] || mode;
}

/* --- Dépenses : calcul du montant attribué au projet selon le mode choisi --- */
function calculerMontantAttribueDepense(depense){
  const montant = Number(depense.amount) || 0;
  const nbJours = calculerNbJoursExecution();
  const heuresTotal = calculerHeuresExecutionTotal();
  switch(depense.mode){
    case 'ponctuel_fixe':
      return montant;
    case 'ponctuel_jour':
      return montant * nbJours;
    case 'hebdo':
      return (montant / 7) * nbJours;
    case 'mensuel':
      return (montant / 30) * nbJours;
    case 'annuel':
      return (montant / 365) * nbJours;
    case 'horaire':
      return montant * heuresTotal;
    default:
      return montant;
  }
}

function calculerDepensesProratees(){
  let total = 0;
  const lignes = state.expenses.map(d => {
    const montantAttribue = calculerMontantAttribueDepense(d);
    total += montantAttribue;
    return Object.assign({}, d, { montantAttribue });
  });
  return { lignes, total };
}

/* --- Main d'œuvre : deux phases (préparation / exécution), split salarié vs bénévole --- */
function calculerHeuresEntreeMainOeuvre(entree){
  if(entree.phase === 'preparation'){
    return (Number(entree.joursPreparation) || 0) * (Number(entree.heuresParJour) || 0);
  }
  return Number(entree.heures) || 0;
}

function calculerCoutMainOeuvre(){
  let coutPreparationSalarie = 0, coutExecutionSalarie = 0;
  let coutPreparationBenevole = 0, coutExecutionBenevole = 0;

  state.labor.forEach(entree => {
    const membre = trouverMembre(entree.memberId);
    if(!membre) return;
    const heures = calculerHeuresEntreeMainOeuvre(entree);
    const taux = Number(membre.hourlyRate) || 0;
    const cout = heures * taux;
    if(membre.type === 'salarie'){
      if(entree.phase === 'preparation') coutPreparationSalarie += cout; else coutExecutionSalarie += cout;
    }else{
      if(entree.phase === 'preparation') coutPreparationBenevole += cout; else coutExecutionBenevole += cout;
    }
  });

  return {
    coutPreparationSalarie, coutExecutionSalarie,
    coutTotalSalarie: coutPreparationSalarie + coutExecutionSalarie,
    coutPreparationBenevole, coutExecutionBenevole,
    coutTotalBenevole: coutPreparationBenevole + coutExecutionBenevole
  };
}

function calculerMetriques(){
  const depensesProratees = calculerDepensesProratees();
  const mainOeuvre = calculerCoutMainOeuvre();

  const totalDepensesReelles = depensesProratees.total + mainOeuvre.coutTotalSalarie;
  const totalValorise = totalDepensesReelles + mainOeuvre.coutTotalBenevole;

  const totalTaches = state.tasks.length;
  const tachesTerminees = state.tasks.filter(t => t.status === 'termine').length;
  const tachesEnCours = state.tasks.filter(t => t.status === 'encours').length;
  const avancement = totalTaches === 0 ? 0 : Math.round((tachesTerminees / totalTaches) * 100);

  const prixTicket = Number(state.simulator.ticketPrice) || 0;
  const nbParticipants = Number(state.simulator.participants) || 0;
  const recettesSimulees = prixTicket * nbParticipants;
  const resultatSimule = recettesSimulees - totalDepensesReelles;
  const seuilRentabiliteParticipants = prixTicket > 0 ? Math.ceil(totalDepensesReelles / prixTicket) : null;

  return {
    depensesProrateesTotal: depensesProratees.total,
    coutPreparationSalarie: mainOeuvre.coutPreparationSalarie,
    coutExecutionSalarie: mainOeuvre.coutExecutionSalarie,
    coutTotalSalarie: mainOeuvre.coutTotalSalarie,
    coutPreparationBenevole: mainOeuvre.coutPreparationBenevole,
    coutExecutionBenevole: mainOeuvre.coutExecutionBenevole,
    coutTotalBenevole: mainOeuvre.coutTotalBenevole,
    nbJoursExecution: calculerNbJoursExecution(),
    heuresExecutionTotal: calculerHeuresExecutionTotal(),
    totalDepensesReelles, totalValorise,
    totalTaches, tachesTerminees, tachesEnCours, avancement,
    prixTicket, nbParticipants, recettesSimulees, resultatSimule,
    seuilRentabiliteParticipants
  };
}

function libelleStatutTache(statut){

function dessinerGraphiqueRentabilite(m){
  const ctx = document.getElementById('profit-chart');
  if(!ctx) return;
  const prix = m.prixTicket || 0;
  const maxParticipants = Math.max((m.seuilRentabiliteParticipants || 10) * 2, m.nbParticipants * 2, 20);
  const pas = Math.max(1, Math.round(maxParticipants / 10));
  const labels = [];
  const recettesData = [];
  const coutsData = [];
  for(let p = 0; p <= maxParticipants; p += pas){
    labels.push(p);
    recettesData.push(p * prix);
    coutsData.push(m.totalDepensesReelles);
  }
  if(profitChartInstance) profitChartInstance.destroy();
  profitChartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Recettes', data: recettesData, borderColor: '#0F5257', backgroundColor: 'rgba(15,82,87,0.08)', fill: true, tension: 0.15, pointRadius: 0, borderWidth: 2.5 },
        { label: 'Coûts totaux', data: coutsData, borderColor: '#E03131', backgroundColor: 'rgba(224,49,49,0.04)', fill: true, tension: 0, pointRadius: 0, borderWidth: 2.5, borderDash: [6,4] }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { position: 'bottom', labels: { boxWidth: 12, font: { family: 'Inter', size: 11.5 } } },
        tooltip: { callbacks: { label: (c) => c.dataset.label + ' : ' + formaterMontant(c.parsed.y) } }
      },
      scales: {
        x: { title: { display: true, text: 'Nombre de participants', font: { family:'Inter', size: 11 } }, grid: { display: false } },
        y: { title: { display: true, text: 'Montant (€)', font: { family:'Inter', size: 11 } }, grid: { color: '#EEF1EF' } }
      }
    }
  });
}

function genererTachesDepuisObjectifs(){
  const texte = state.project.objectives || '';
  const items = texte.split(/,|\s[-–—]\s/).map(s => s.trim()).filter(s => s.length > 0);
  if(items.length === 0) return 0;

  const labelsExistants = new Set(state.tasks.map(t => (t.label || '').trim().toLowerCase()));
  let nbAjoutees = 0;
  items.forEach(item => {
    const cle = item.toLowerCase();
    if(labelsExistants.has(cle)) return;
    state.tasks.push({ id: genererId(), label: item, assigneeId: '', estimatedHours: 0, deadline: '', status: 'afaire' });
    labelsExistants.add(cle);
    nbAjoutees++;
  });
  return nbAjoutees;
}

  state.team = state.team.filter(m => m.id !== id);

function filtrerTaches(statut){
  filtreStatutTache = statut;
  rendreTaches();
}

function ouvrirModalTache(id){
  editingTaskId = id || null;
  const tache = editingTaskId ? state.tasks.find(t => t.id === editingTaskId) : null;
  if(!tache && state.team.length === 0){ afficherToast("Ajoute d'abord au moins un membre d'équipe.", 'erreur'); return; }
  const optionsMembres = '<option value="">Non assignée</option>' + state.team.map(mb => `<option value="${mb.id}" ${tache && tache.assigneeId === mb.id ? 'selected' : ''}>${echapperHtml(mb.name)}</option>`).join('');
  const racine = document.getElementById('modal-root');
  racine.innerHTML = `
    <div class="modal-backdrop show" id="modal-tache-backdrop">
      <div class="modal-box">
        <h3 class="font-display" style="font-size:16px; font-weight:700; margin:0 0 16px 0;">${tache ? 'Modifier la tâche' : 'Ajouter une tâche'}</h3>
        <div style="display:flex; flex-direction:column; gap:12px;">
          <div>
            <label class="field-label">Libellé de la tâche</label>
            <input type="text" class="input-field" id="tache-label" placeholder="Ex. Réserver la salle" value="${tache ? echapperHtml(tache.label) : ''}">
          </div>
          <div>
            <label class="field-label">Attribution</label>
            <select class="input-field" id="tache-assignee">${optionsMembres}</select>
          </div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
            <div>
              <label class="field-label">Temps estimé (h)</label>
              <input type="number" class="input-field" id="tache-heures" min="0" step="0.5" placeholder="0" value="${tache ? Number(tache.estimatedHours) || 0 : ''}">
            </div>
            <div>
              <label class="field-label">Date limite</label>
              <input type="date" class="input-field" id="tache-deadline" value="${tache ? echapperHtml(tache.deadline || '') : ''}">
            </div>
          </div>
          <div>
            <label class="field-label">Statut</label>
            <select class="input-field" id="tache-statut">
              <option value="afaire" ${tache && tache.status === 'afaire' ? 'selected' : ''}>À faire</option>
              <option value="encours" ${tache && tache.status === 'encours' ? 'selected' : ''}>En cours</option>
              <option value="termine" ${tache && tache.status === 'termine' ? 'selected' : ''}>Terminé</option>
            </select>
          </div>
        </div>
        <div style="display:flex; gap:10px; margin-top:20px; justify-content:flex-end;">
          <button class="btn-secondary" onclick="fermerModal()">Annuler</button>
          <button class="btn-primary" onclick="enregistrerTache()"><i data-lucide="check" style="width:15px;height:15px;"></i> ${tache ? 'Enregistrer les modifications' : 'Ajouter'}</button>
        </div>
      </div>
    </div>
  `;
  rafraichirIcones();
  document.getElementById('modal-tache-backdrop').addEventListener('click', (e) => { if(e.target.id === 'modal-tache-backdrop') fermerModal(); });
}

function enregistrerTache(){
  const label = document.getElementById('tache-label').value.trim();
  const assigneeId = document.getElementById('tache-assignee').value;
  const heures = parseFloat(document.getElementById('tache-heures').value) || 0;
  const deadline = document.getElementById('tache-deadline').value;
  const statut = document.getElementById('tache-statut').value;
  if(!label){ afficherToast('Indique un libellé pour cette tâche.', 'erreur'); return; }

  if(editingTaskId){
    const tache = state.tasks.find(t => t.id === editingTaskId);
    if(tache){
      tache.label = label; tache.assigneeId = assigneeId; tache.estimatedHours = heures; tache.deadline = deadline; tache.status = statut;
    }
    afficherToast('Tâche modifiée.', 'succes');
  }else{
    state.tasks.push({ id: genererId(), label, assigneeId, estimatedHours: heures, deadline, status: statut });
    afficherToast('Tâche ajoutée.', 'succes');
  }
  editingTaskId = null;
  planifierSauvegarde();
  fermerModal();
  rendreTaches();
  rendreAccueil();
  rendreBudget();
}

function changerStatutTache(id, nouveauStatut){
  const tache = state.tasks.find(t => t.id === id);
  if(!tache) return;
  tache.status = nouveauStatut;
  planifierSauvegarde();
  rendreTaches();
  rendreAccueil();
  afficherToast('Statut mis à jour.', 'info');
}

function supprimerTache(id){
  state.tasks = state.tasks.filter(t => t.id !== id);
  planifierSauvegarde();
  rendreTaches();
  rendreAccueil();
  rendreBudget();
  afficherToast('Tâche supprimée.', 'info');
}

    const session = trouverSession(e.sessionId);

          </button>

            <i data-lucide="trash-2" style="width:16px;height:16px;"></i>

          <h3 class="font-display" style="font-size:15px; font-weight:700; margin:0;">Sessions d'exécution du projet</h3>

        </div>
        <button class="btn-primary" onclick="ouvrirModalSession()">
          <i data-lucide="calendar-plus" style="width:15px;height:15px;"></i> Ajouter une session
        </button>

      ${state.executionSessions.length === 0 ? `

          <p style="font-size:13.5px; margin:0;">Aucune session définie. Ajoute chaque jour ou soirée d'exécution (ex. 10/08/2026 — 4h).</p>

      <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(260px,1fr)); gap:24px; margin-bottom:22px;">

}

function rendreResultatsSimulateur(m){
  const estViable = m.resultatSimule >= 0;
  return `
    <div class="card" style="padding:16px; background:var(--surface-2); border:none;">
      <div style="font-size:12px; color:var(--ink-soft); font-weight:600; margin-bottom:6px;">Recettes simulées</div>
      <div class="font-mono-num" style="font-size:19px; font-weight:700;">${formaterMontant(m.recettesSimulees)}</div>
    </div>
    <div class="card" style="padding:16px; background:var(--surface-2); border:none;">
      <div style="font-size:12px; color:var(--ink-soft); font-weight:600; margin-bottom:6px;">Seuil de rentabilité</div>
      <div class="font-mono-num" style="font-size:19px; font-weight:700;">${m.seuilRentabiliteParticipants == null ? '—' : m.seuilRentabiliteParticipants + ' participants'}</div>
    </div>
    <div class="card" style="padding:16px; background:${estViable ? 'var(--success-soft)' : 'var(--danger-soft)'}; border:none;">
      <div style="font-size:12px; color:${estViable ? 'var(--success)' : 'var(--danger)'}; font-weight:600; margin-bottom:6px;">${estViable ? 'Bénéfice estimé' : 'Déficit estimé'}</div>
      <div class="font-mono-num" style="font-size:19px; font-weight:700; color:${estViable ? 'var(--success)' : 'var(--danger)'};">${estViable ? '+' : ''}${formaterMontant(m.resultatSimule)}</div>
    </div>
  `;
}

function ajusterSimulateur(){
  const participants = parseInt(document.getElementById('sim-participants').value, 10) || 0;
  const prix = parseInt(document.getElementById('sim-prix').value, 10) || 0;
  state.simulator.participants = participants;
  state.simulator.ticketPrice = prix;
  document.getElementById('sim-participants-val').textContent = participants;
  document.getElementById('sim-prix-val').textContent = formaterMontant(prix);
  const m = calculerMetriques();

  const conteneurListe = document.getElementById('saved-projects-list');
  if(!conteneurListe) return;
  const projets = await listerProjetsEnregistres();
  if(!document.getElementById('saved-projects-list')) return;

  if(projets.length === 0){
    conteneurListe.innerHTML = `
      <div style="text-align:center; padding:24px 10px; color:var(--ink-soft);">
        <i data-lucide="folder-open" style="width:30px;height:30px; margin-bottom:8px; opacity:.5;"></i>
        <p style="font-size:13px; margin:0;">Aucun projet enregistré pour l'instant. Crée un fichier ou clique sur « Enregistrer maintenant » pour qu'il apparaisse ici.</p>
      </div>
    `;
    rafraichirIcones();
    return;
  }

  conteneurListe.innerHTML = projets.map(p => {
    const titre = p.dateLabel ? (echapperHtml(p.name) + ' — ' + echapperHtml(p.dateLabel)) : echapperHtml(p.name);
    return `
      <div onclick="ouvrirProjetDepuisListe('${p.id}')" style="display:flex; align-items:center; justify-content:space-between; gap:10px; padding:13px 14px; border-radius:12px; border:1px solid var(--border); margin-bottom:8px; cursor:pointer; transition:background .12s ease;" onmouseover="this.style.background='var(--surface-2)'" onmouseout="this.style.background='transparent'">
        <div style="display:flex; align-items:center; gap:12px; min-width:0;">
          <div style="width:36px;height:36px;border-radius:10px; background:var(--primary-soft); display:flex; align-items:center; justify-content:center; flex-shrink:0;">
            <i data-lucide="folder-open" style="width:17px;height:17px; color:var(--primary-dark);"></i>
          </div>
          <div style="min-width:0;">
            <div style="font-weight:700; font-size:13.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${titre}</div>
            <div style="font-size:11.5px; color:var(--ink-soft);">Enregistré ${formaterDate(p.lastSaved)}</div>
          </div>
        </div>
        <button class="btn-danger-ghost" onclick="retirerProjetDeListe('${p.id}', event)" title="Retirer de la liste">
          <i data-lucide="x" style="width:15px;height:15px;"></i>
        </button>
      </div>
    `;
  }).join('');
  rafraichirIcones();
}

/* =========================================================================
   13. NAVIGATION ENTRE LES MODULES
   ========================================================================= */
function naviguerVers(vue){
  currentView = vue;
  document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + vue).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.view === vue));
  document.querySelectorAll('.bottom-nav-item').forEach(el => el.classList.toggle('active', el.dataset.view === vue));
  document.getElementById('main-area').scrollTop = 0;
  rendreVue(vue);
}

function rendreVue(vue){
  if(vue === 'accueil') rendreAccueil();
  else if(vue === 'config') rendreConfig();
  else if(vue === 'taches') rendreTaches();
  else if(vue === 'budget') rendreBudget();
  else if(vue === 'fichier') rendreFichier();
  else if(vue === 'sync') rendreSync();
}

function rendreTout(){
  rendreVue(currentView);
  mettreAJourStatutFichier();
  mettreAJourStatutSync();
}

/* =========================================================================
   VUE : SYNCHRONISATION ENTRE APPAREILS
   ========================================================================= */
function rendreSync(){
  const conteneur = document.getElementById('view-sync');

  if(!supabaseEstConfigure()){
    conteneur.innerHTML = `
      <h1 class="font-display" style="font-size:22px; font-weight:700; margin:0 0 6px 0;">Synchronisation</h1>
      <div class="card" style="padding:22px; background:var(--accent-soft); border:none;">
        <div style="font-size:13.5px; color:#8a6100; font-weight:600;">
          La synchronisation entre appareils n'est pas encore configurée pour cette installation.
          Suis le guide de configuration Supabase fourni pour l'activer.
        </div>
      </div>
    `;
    return;
  }

  if(syncCode){
    conteneur.innerHTML = `
      <h1 class="font-display" style="font-size:22px; font-weight:700; margin:0 0 6px 0;">Synchronisation</h1>
      <p style="font-size:13.5px; color:var(--ink-soft); margin:0 0 22px 0;">Ce projet est synchronisé en temps réel avec tous les appareils utilisant le même code d'équipe.</p>

      <div class="card" style="padding:24px; max-width:480px;">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:16px;">
          <span class="file-status-dot" id="sync-status-dot-view" style="background:var(--success); position:relative; top:0;"></span>
          <span style="font-weight:700; font-size:14px;" id="sync-status-text-view">Synchronisé</span>
        </div>
        <div class="field-label">Code d'équipe</div>
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:18px;">
          <div style="font-family:'IBM Plex Mono',monospace; font-size:22px; font-weight:700; letter-spacing:.08em; background:var(--surface-2); padding:10px 16px; border-radius:10px;">${echapperHtml(syncCode)}</div>
          <button class="btn-secondary" onclick="navigator.clipboard.writeText('${syncCode}'); afficherToast('Code copié.', 'succes');">
            <i data-lucide="copy" style="width:14px;height:14px;"></i> Copier
          </button>
        </div>
        <p style="font-size:12.5px; color:var(--ink-soft); margin:0 0 16px 0;">Communique ce code aux autres membres de l'équipe pour qu'ils voient et modifient le même projet en direct.</p>
        <button class="btn-secondary" onclick="quitterSync()" style="color:var(--danger); border-color:var(--danger-soft);">
          <i data-lucide="unlink" style="width:14px;height:14px;"></i> Désactiver la synchronisation
        </button>
      </div>
    `;
  }else{
    conteneur.innerHTML = `
      <h1 class="font-display" style="font-size:22px; font-weight:700; margin:0 0 6px 0;">Synchronisation</h1>
      <p style="font-size:13.5px; color:var(--ink-soft); margin:0 0 22px 0;">Relie plusieurs appareils (ordinateur, tablette, smartphone) pour qu'ils partagent le même projet, mis à jour instantanément.</p>

      <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(280px,1fr)); gap:16px; max-width:820px;">
        <div class="card" style="padding:24px;">
          <i data-lucide="plus-circle" style="width:26px;height:26px; color:var(--primary); margin-bottom:12px;"></i>
          <h3 class="font-display" style="font-size:15px; font-weight:700; margin:0 0 6px 0;">Créer un code d'équipe</h3>
          <p style="font-size:13px; color:var(--ink-soft); margin:0 0 16px 0;">À faire une seule fois, sur le premier appareil. Le projet actuel sera partagé.</p>
          <button class="btn-primary" onclick="creerNouveauCodeSync()"><i data-lucide="refresh-cw" style="width:15px;height:15px;"></i> Générer un code</button>
        </div>
        <div class="card" style="padding:24px;">
          <i data-lucide="log-in" style="width:26px;height:26px; color:var(--primary); margin-bottom:12px;"></i>
          <h3 class="font-display" style="font-size:15px; font-weight:700; margin:0 0 6px 0;">Rejoindre une équipe</h3>
          <p style="font-size:13px; color:var(--ink-soft); margin:0 0 16px 0;">Sur les autres appareils, entre le code reçu pour ouvrir le même projet.</p>
          <div style="display:flex; gap:8px;">
            <input type="text" id="input-code-sync" class="input-field" maxlength="6" placeholder="EX: A3F9K2" style="text-transform:uppercase; font-family:'IBM Plex Mono',monospace; letter-spacing:.08em;">
            <button class="btn-secondary" onclick="rejoindreCodeSync(document.getElementById('input-code-sync').value)">Rejoindre</button>
          </div>
        </div>
      </div>

      <div class="card" style="padding:18px 22px; margin-top:16px; background:var(--danger-soft); border:none; max-width:820px;">
        <div style="font-size:13px; color:var(--danger); font-weight:600;">Rejoindre un code remplace le projet actuellement affiché sur cet appareil par celui de l'équipe.</div>
      </div>
    `;
  }
  rafraichirIcones();
}

/* =========================================================================
   14. INITIALISATION
   ========================================================================= */
document.addEventListener('DOMContentLoaded', async () => {
  rafraichirIcones();

  document.querySelectorAll('.nav-item').forEach(el => {
    el.addEventListener('click', () => naviguerVers(el.dataset.view));
  });
  document.querySelectorAll('.bottom-nav-item').forEach(el => {
    el.addEventListener('click', () => naviguerVers(el.dataset.view));
  });

  await initialiserPersistance();

  // Synchronisation cloud : reprise automatique si un code était déjà actif
  initialiserSupabase();
  reprendreSyncSiExistant();

  rendreTout();

  if(supportFileSystemAccess() && !fileHandle){
    naviguerVers('fichier');
    afficherToast("Crée ou ouvre un fichier de projet pour commencer.", 'info');
  }else if(!supportFileSystemAccess()){
    naviguerVers('fichier');
  }
});

/* =========================================================================
   PWA : ENREGISTREMENT DU SERVICE WORKER + BOUTON D'INSTALLATION
   ========================================================================= */
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js').catch((erreur) => {
      console.error('Échec de l\'enregistrement du service worker :', erreur);
    });
  });
}

let evenementInstallationDiffere = null;

window.addEventListener('beforeinstallprompt', (evenement) => {
  // Empêche la mini-bannière automatique du navigateur pour proposer
  // notre propre bouton, intégré à l'interface.
  evenement.preventDefault();
  evenementInstallationDiffere = evenement;
  const bouton = document.getElementById('install-pwa-btn');
  if(bouton) bouton.style.display = 'flex';
});

document.getElementById('install-pwa-btn').addEventListener('click', async () => {
  if(!evenementInstallationDiffere) return;
  evenementInstallationDiffere.prompt();
  const { outcome } = await evenementInstallationDiffere.userChoice;
  if(outcome === 'accepted'){
    afficherToast('Application installée avec succès.', 'succes');
  }
  evenementInstallationDiffere = null;
  document.getElementById('install-pwa-btn').style.display = 'none';
});

window.addEventListener('appinstalled', () => {
  const bouton = document.getElementById('install-pwa-btn');
  if(bouton) bouton.style.display = 'none';
});
</script>
